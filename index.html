<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2f241a">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 2 L40 22 L62 24 L45 39 L51 61 L32 48 L13 61 L19 39 L2 24 L24 22 Z' fill='%23ffd60a'/%3E%3C/svg%3E">
<title>Vroom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2634; touch-action: none; }
  svg { display: block; pointer-events: none; }

  #stage {
    position: absolute; left: 50%; top: 50%;
    width: 1200px; height: 700px;
    transform-origin: center;
    overflow: hidden; border-radius: 12px;
  }
  .scene { position: absolute; inset: 0; display: none; }
  .scene.active { display: block; }

  /* ---------- SHARED CHIPS ---------- */
  .chip {
    position: absolute; height: 96px; border-radius: 26px; background: #fff;
    border: 6px solid #023047; display: flex; align-items: center; gap: 10px;
    padding: 0 22px; z-index: 20; font: 900 44px/1 -apple-system, "Arial Rounded MT Bold", sans-serif;
    color: #023047;
  }
  .chip svg { width: 52px; height: 52px; }
  .chip.pop { animation: chipPop .35s ease; }
  .chip.deny { animation: denyShake .4s ease; }
  @keyframes chipPop { 40% { transform: scale(1.18); } }
  @keyframes denyShake { 20%,60% { transform: translateX(-10px); } 40%,80% { transform: translateX(10px); } }

  /* ---------- GARAGE ---------- */
  #garage { background: linear-gradient(#8ecae6 0%, #bde0fe 55%, #a8763e 55%, #8a5a2b 100%); }
  #garageWall {
    position: absolute; left: 60px; right: 60px; top: 30px; height: 360px;
    background: #e9ecef; border-radius: 18px 18px 0 0; border: 8px solid #adb5bd; border-bottom: none;
  }
  #garageWall::before {
    content: ""; position: absolute; left: 20px; right: 20px; top: 18px; height: 26px;
    background: repeating-linear-gradient(90deg, #f77f00 0 40px, #fcbf49 40px 80px); border-radius: 8px;
  }
  #garageSign {
    position: absolute; left: 50%; top: -6px; transform: translateX(-50%);
    background: #023047; color: #ffb703; font: 900 34px/1 -apple-system, "Arial Rounded MT Bold", sans-serif;
    letter-spacing: 6px; padding: 10px 28px; border-radius: 14px; border: 5px solid #ffb703;
  }
  #preview {
    position: absolute; left: 50%; top: 164px; transform: translateX(-50%);
    width: 440px; cursor: pointer; touch-action: none; pointer-events: auto;
  }
  #preview svg { width: 100%; height: auto; overflow: visible; }
  /* locked stays full color — the kid needs to see the cool thing; the padlock badge says "not yet" */
  #previewLock {
    position: absolute; left: 50%; top: 150px; transform: translateX(-50%);
    width: 96px; height: 96px; border-radius: 50%; background: #023047; border: 6px solid #ffb703;
    display: none; align-items: center; justify-content: center; z-index: 6;
    animation: lockPulse 1.1s ease infinite; pointer-events: none;
  }
  #previewLock.show { display: flex; }
  #previewLock svg { width: 52px; height: 52px; }
  /* pulse alone would drop the translateX(-50%) centering, so compose it in */
  @keyframes lockPulse {
    0%,100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.09); }
  }
  #preview.bounce { animation: bounce .45s ease; }
  @keyframes bounce {
    0% { transform: translateX(-50%) scale(1); }
    30% { transform: translateX(-50%) scale(1.08, .88); }
    60% { transform: translateX(-50%) scale(.95, 1.06); }
    100% { transform: translateX(-50%) scale(1); }
  }
  #garageFloor {
    position: absolute; left: 0; right: 0; top: 426px; height: 40px;
    background: #6c757d; border-top: 6px solid #495057;
  }
  #priceTag {
    position: absolute; left: calc(50% + 205px); top: 250px; height: 96px;
    border-radius: 26px; background: #ffb703; border: 6px solid #023047;
    display: none; align-items: center; gap: 10px; padding: 0 24px; z-index: 6;
    font: 900 46px/1 -apple-system, "Arial Rounded MT Bold", sans-serif; color: #023047;
    cursor: pointer; touch-action: none; box-shadow: 0 6px 0 rgba(0,0,0,.35);
    animation: tagWiggle 1.6s ease infinite;
  }
  #priceTag.show { display: flex; }
  #priceTag svg { width: 54px; height: 54px; }
  /* green = you can afford it, gray = keep collecting */
  #priceTag { background: #adb5bd; }
  #priceTag.afford { background: #38b000; color: #fff; border-color: #d8f3dc; }
  /* keep the wiggle alive after the shake — .deny stays on the class list */
  #priceTag.deny { animation: denyShake .4s ease, tagWiggle 1.6s ease .4s infinite; }
  @keyframes tagWiggle { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }

  /* ---------- DICE + QUIET + EASTER EGGS ---------- */
  #diceBtn, #quietBtn {
    position: absolute; width: 96px; height: 96px; border-radius: 26px;
    background: #fff; border: 6px solid #023047; z-index: 5;
  }
  /* right-wall stack (wallet 24-120, repair 132-236, wash 246-334, dice 344-432): 88px keeps the dice + its 6px shadow above the 440px workbench */
  #diceBtn { right: 96px; top: 344px; width: 88px; height: 88px; }
  #washBtn { position: absolute; right: 96px; top: 246px; width: 88px; height: 88px; border-radius: 26px; background: #6fc0df; border: 6px solid #fff; z-index: 5; display: none; animation: pulse 1.1s ease infinite; }
  #washBtn.show { display: flex; }
  #washBtn svg { width: 60px; height: 60px; }
  #quietBtn { right: 200px; top: 24px; background: #e9ecef; z-index: 20; }
  #profileBtn {
    position: absolute; left: 24px; top: 24px; width: 96px; height: 96px;
    border-radius: 50%; background: #fff; border: 6px solid #023047; z-index: 20;
  }
  #profileBtn svg { width: 74px; height: 74px; }
  #profileOverlay {
    position: absolute; inset: 0; z-index: 80; display: none;
    background: rgba(2,48,71,.6); align-items: center; justify-content: center;
  }
  #profileOverlay.show { display: flex; }
  #profilePanel {
    background: #f7ede2; border-radius: 34px; border: 8px solid #ffb703;
    padding: 40px 48px; display: flex; flex-direction: column; gap: 30px; align-items: center;
  }
  #profileSlots { display: flex; gap: 26px; }
  .profileSlot {
    width: 132px; height: 132px; border-radius: 50%; background: #fff;
    border: 7px solid #023047; display: flex; align-items: center; justify-content: center;
  }
  .profileSlot.empty { background: #00000012; border-style: dashed; border-color: #b08968; }
  .profileSlot.activeP { outline: 7px solid #38b000; }
  .profileSlot svg { width: 96px; height: 96px; }
  .profileSlot .plus { font: 900 64px/1 -apple-system, "Arial Rounded MT Bold", sans-serif; color: #b08968; }
  #saveTools { display: flex; gap: 22px; align-items: center; }
  #qrBox { width: 176px; height: 176px; background: #fff; border-radius: 12px; border: 5px solid #023047; display: flex; align-items: center; justify-content: center; }
  #qrBox canvas { image-rendering: pixelated; }
  #copyCodeBtn, #pasteCodeBtn { width: 96px; height: 96px; border-radius: 26px; background: #219ebc; border: 6px solid #bde0fe; }
  #copyCodeBtn svg, #pasteCodeBtn svg { width: 58px; height: 58px; }
  #importConfirm {
    position: absolute; inset: 0; z-index: 90; display: none;
    background: rgba(2,48,71,.7); align-items: center; justify-content: center; gap: 40px;
  }
  #importConfirm.show { display: flex; }
  #importYes { width: 170px; height: 170px; border-radius: 50%; background: #38b000; border: 10px solid #d8f3dc; }
  #importNo { width: 130px; height: 130px; border-radius: 50%; background: #e63946; border: 10px solid #fff; }
  #importYes svg, #importNo svg { width: 80px; height: 80px; }
  #diceBtn svg, #quietBtn svg { width: 60px; height: 60px; }
  #diceBtn.rolling { animation: diceShake .12s linear infinite; }
  @keyframes diceShake { 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
  .vEye { transform-box: fill-box; transform-origin: center; }
  #preview.blink .vEye { animation: eyeBlink .5s ease; }
  @keyframes eyeBlink { 15%, 35% { transform: scaleY(.08); } 55% { transform: scaleY(1.05); } }
  #sun { cursor: pointer; pointer-events: auto; }
  #sun.cool { animation: sunWiggle .8s ease; }
  @keyframes sunWiggle { 25% { transform: rotate(-6deg); } 55% { transform: rotate(6deg); } }
  #sun .shades { animation: shadesDrop .5s cubic-bezier(.2,2,.4,1); }
  @keyframes shadesDrop { 0% { transform: translateY(-46px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  .cloud { cursor: pointer; pointer-events: auto; }
  .cloud.puffed { animation: cloudPuff 1.2s ease; }
  @keyframes cloudPuff { 30% { transform: scale(1.28, .7); opacity: .55; } 60% { transform: scale(.75, 1.2); } }
  #garageSign { cursor: pointer; }
  #garageSign span { display: inline-block; }
  #garageSign.bouncy span { animation: signHop .5s ease; }
  @keyframes signHop { 40% { transform: translateY(-16px) scale(1.15); } }

  /* ---------- UPGRADES + REPAIR ---------- */
  /* rack bottom + 6px shadow must clear the 260px workbench (top edge 440) */
  #upgrades { position: absolute; left: 84px; top: 128px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
  .upgBtn {
    width: 96px; height: 96px; border-radius: 24px; background: #457b9d;
    flex-direction: column; gap: 3px; position: relative;
  }
  .upgBtn > svg { width: 40px; height: 40px; }
  .upgBtn.maxed { background: #2a9d8f; }
  .upgBtn.deny { animation: denyShake .4s ease; }
  .pips { display: flex; gap: 5px; }
  .pips i { width: 13px; height: 13px; border-radius: 50%; background: #02304766; display: block; }
  .pips i.on { background: #ffd60a; }
  .upgPrice { display: flex; align-items: center; gap: 3px; font: 900 20px/1 -apple-system, "Arial Rounded MT Bold", sans-serif; color: #fff; }
  .upgPrice svg { width: 20px; height: 20px; }
  .upgBtn.cant .upgPrice { opacity: .55; }
  #repairBtn {
    position: absolute; right: 96px; top: 132px; width: 104px; height: 104px;
    border-radius: 50%; background: #e76f51; border: 8px solid #fff;
    display: none; flex-direction: column; gap: 2px; z-index: 5;
    animation: pulse 1.1s ease infinite;
  }
  #repairBtn.show { display: flex; }
  #repairBtn > svg { width: 48px; height: 48px; }

  #controls {
    position: absolute; left: 0; right: 0; bottom: 0; height: 260px;
    background: #023047; border-top: 8px solid #ffb703;
    display: flex; align-items: center; justify-content: center; gap: 12px; padding: 0 8px;
  }
  .tray {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.08); border-radius: 24px; padding: 8px;
  }
  /* build tray: body / wheels / decal side by side */
  #goCol { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .bigBtn {
    border: none; border-radius: 24px; cursor: pointer; touch-action: none;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 0 rgba(0,0,0,.35); transition: transform .08s;
  }
  .bigBtn:active, .bigBtn.pressed { transform: translateY(4px) scale(.96); box-shadow: 0 2px 0 rgba(0,0,0,.35); }
  #bodyBtn, #wheelBtn, #decalBtn { width: 104px; height: 104px; background: #219ebc; }
  #bodyBtn svg, #wheelBtn svg, #decalBtn svg { width: 76px; height: 76px; }

  /* 76px stage size = 64.8px rendered at iPad landscape scale (.853) — SPEC floor is 64 */
  #swatches { display: grid; grid-template-columns: repeat(4, 76px); grid-template-rows: repeat(3, 76px); gap: 7px; }
  .swatch {
    position: relative; width: 76px; height: 76px; border-radius: 50%; border: 5px solid rgba(255,255,255,.85);
    cursor: pointer; touch-action: none; box-shadow: 0 4px 0 rgba(0,0,0,.35); transition: transform .08s;
  }
  .swatch:active { transform: scale(.9); }
  .swatch.selected { border-color: #ffb703; transform: scale(1.1); }
  .swatch .lockDot, .lvlBtn .lockDot {
    position: absolute; right: -6px; bottom: -6px; width: 28px; height: 28px; border-radius: 50%;
    background: #023047; display: flex; align-items: center; justify-content: center;
  }
  .lockDot svg { width: 16px; height: 16px; }

  #extras { display: grid; grid-template-columns: repeat(3, 76px); gap: 7px; }
  .extraBtn {
    position: relative; width: 76px; height: 76px; border-radius: 20px; background: #457b9d; opacity: .55;
    border: 5px solid rgba(255,255,255,.5);
  }
  .extraBtn.on { background: #2a9d8f; opacity: 1; border-color: #ffb703; }
  .extraBtn svg { width: 48px; height: 48px; }

  #mapBtn { width: 84px; height: 84px; border-radius: 50%; background: #219ebc; border: 6px solid #bde0fe; }
  #mapBtn svg { width: 52px; height: 52px; }

  #goBtn {
    width: 140px; height: 140px; border-radius: 50%; background: #38b000;
    border: 8px solid #d8f3dc;
  }
  #goBtn svg { width: 72px; height: 72px; }
  #goBtn.locked { background: #6c757d; border-color: #adb5bd; filter: opacity(.7); }

  /* ---------- STICKER ALBUM ---------- */
  #album { background: linear-gradient(#f7ede2, #f2e0c9); }
  #album::before {
    content: ""; position: absolute; inset: 22px; border: 6px dashed #d4a37366; border-radius: 26px;
  }
  #albumBook {
    position: absolute; left: 50%; top: 140px; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 26px; align-items: center;
  }
  .albumRow { display: flex; gap: 16px; }
  .buddySlot, .badgeSlot {
    width: 112px; height: 112px; border-radius: 50%;
    background: #00000010; border: 5px dashed #b0896899;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; position: relative;
  }
  .badgeSlot { border-radius: 26px; width: 104px; height: 104px; }
  .buddySlot.filled, .badgeSlot.filled { background: #fff; border-style: solid; border-color: #ffb703; box-shadow: 0 4px 0 rgba(0,0,0,.15); }
  .buddySlot.equipped { outline: 6px solid #38b000; }
  .buddySlot svg { width: 78px; height: 78px; }
  .badgeSlot svg { width: 66px; height: 66px; }
  .buddySlot .sil, .badgeSlot .sil { filter: brightness(0); opacity: .18; }
  .buddySlot.wiggle, .badgeSlot.wiggle, .photoSlot.wiggle { animation: stickerWiggle .5s ease; }
  @keyframes stickerWiggle { 25% { transform: rotate(-7deg) scale(1.08); } 65% { transform: rotate(6deg) scale(1.04); } }
  .photoSlot {
    width: 150px; height: 184px; background: #fff; border-radius: 8px;
    box-shadow: 0 5px 0 rgba(0,0,0,.18); padding: 8px; cursor: pointer; touch-action: none;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transform: rotate(var(--tilt, 0deg));
  }
  .photoSlot.empty { background: #00000010; border: 5px dashed #b0896899; box-shadow: none; }
  .photoCar { width: 134px; height: 120px; background: #bde0fe; border-radius: 6px; overflow: hidden; display: flex; align-items: flex-end; }
  .photoCar svg { width: 100%; height: auto; }
  /* keepsake photos stay pristine — never show the car's current dings or mud */
  .photoCar .dmgScuff, .photoCar .dmgCrack, .photoCar .dmgSmoke, .photoCar .mudSpots { display: none !important; }
  .photoCap { display: flex; align-items: center; gap: 6px; font: 900 26px/1 -apple-system, "Arial Rounded MT Bold", sans-serif; color: #023047; }
  .photoCap svg { width: 30px; height: 30px; }
  #stickerToast {
    position: absolute; left: 50%; top: 130px; transform: translateX(-50%) scale(0);
    background: #fff; border: 6px solid #ffb703; border-radius: 30px; padding: 14px 26px;
    display: flex; gap: 12px; z-index: 70; pointer-events: none;
    transition: transform .3s cubic-bezier(.2,2,.4,1);
  }
  #stickerToast.show { transform: translateX(-50%) scale(1); }
  #stickerToast svg { width: 64px; height: 64px; }
  #albumBtn { position: absolute; right: 320px; top: 24px; width: 96px; height: 96px; border-radius: 26px; background: #fff; border: 6px solid #023047; z-index: 20; }
  #albumBtn svg { width: 60px; height: 60px; }
  .buddyPop { animation: buddyPopUp 1.9s ease forwards; }
  @keyframes buddyPopUp {
    0% { transform: translateY(30px) scale(.3); opacity: 0; }
    25% { transform: translateY(-46px) scale(1.15); opacity: 1; }
    45% { transform: translateY(-30px) scale(1); }
    80% { transform: translateY(-38px) scale(1.05); opacity: 1; }
    100% { transform: translateY(-20px) scale(.9); opacity: 0; }
  }
  .buddyBob { animation: buddyBob 1.6s ease-in-out infinite; transform-box: fill-box; }
  @keyframes buddyBob { 50% { transform: translateY(3.5px); } }

  /* ---------- LEVEL MAP ---------- */
  #map { background: linear-gradient(#8ecae6 0%, #bde0fe 60%, #74c69d 60%, #588157 100%); }
  #freeBtn {
    position: absolute; left: 30px; bottom: 30px; width: 130px; height: 130px;
    border-radius: 50%; background: #38b000; border: 6px solid #d8f3dc; z-index: 6;
  }
  #freeBtn svg { width: 84px; height: 84px; }
  #worldTabs {
    position: absolute; left: 50%; top: 118px; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 5;
  }
  .worldTab { width: 88px; height: 88px; border-radius: 24px; background: #219ebc; position: relative; }
  .worldTab.sel { outline: 6px solid #ffb703; }
  .worldTab.locked { background: #6c757d; opacity: .75; }
  .worldTab.deny { animation: denyShake .4s ease; }
  .worldTab svg { width: 58px; height: 58px; }
  .worldTab span { font: 900 40px/1 -apple-system, "Arial Rounded MT Bold", sans-serif; color: #fff; }
  #mapGround {
    position: absolute; left: 0; right: 0; bottom: 0; height: 300px;
    opacity: .2; border-radius: 60% 40% 0 0 / 30px 40px 0 0;
    transition: background .4s;
  }
  #mapGrid {
    position: absolute; left: 50%; top: 250px; transform: translateX(-50%);
    width: 1140px; height: 360px;
  }
  #mapPath { position: absolute; left: 0; top: 0; }
  .lvlBtn.far {
    width: 44px; height: 44px; margin: 26px;   /* small quiet dot, still centered on its path point */
    border-radius: 50%; opacity: .6;
  }
  .lvlBtn.locked:not(.far) { width: 72px; height: 72px; margin: 12px; border-radius: 50%; }
  .lvlBtn.locked:not(.far) svg { width: 34px; height: 34px; }
  .worldTab.locked { width: 70px; height: 70px; margin-top: 9px; opacity: .55; }
  .worldTab.locked svg { width: 34px; height: 34px; }
  /* entrance choreography: one popIn, staggered by --i */
  @keyframes popIn { 0% { transform: scale(.5); opacity: 0; } 70% { transform: scale(1.06); } 100% { transform: scale(1); opacity: 1; } }
  .enter { animation: popIn .3s cubic-bezier(.2,1.6,.4,1) backwards; animation-delay: calc(var(--i, 0) * 35ms); }
  .pressable:active { transform: translateY(3px) scale(.96); }
  .lvlBtn {
    position: absolute; width: 96px; height: 96px; border-radius: 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    font: 900 34px/1 -apple-system, "Arial Rounded MT Bold", sans-serif; color: #fff;
  }
  .lvlBtn.locked { background: #6c757d; opacity: .75; }
  .lvlBtn.locked.sunset { background: #a26a4f; }
  .lvlBtn.locked.night { background: #3a4a6b; }
  .lvlBtn.open { background: #219ebc; }
  .lvlBtn.done { background: #2a9d8f; }
  .lvlBtn.current { outline: 6px solid #ffb703; }
  .lvlBtn.deny { animation: denyShake .4s ease; }
  .lvlBtn .bandIcon { position: absolute; left: -8px; top: -14px; width: 36px; height: 36px; }
  .lvlBtn .miniStars { display: flex; gap: 2px; height: 20px; }
  .lvlBtn .miniStars svg { width: 20px; height: 20px; }
  .lvlBtn > svg { width: 44px; height: 44px; }

  /* ---------- ROAD ---------- */
  #road { background: linear-gradient(#4cc9f0 0%, #90e0ef 45%, #caf0f8 62%); touch-action: none; }
  #road.sunset { background: linear-gradient(#ff6d00 0%, #ffb85c 45%, #ffe3bd 62%); }
  #road.night { background: linear-gradient(#0d1b2a 0%, #1b263b 45%, #33415c 62%); }
  .layer { position: absolute; top: 0; height: 100%; will-change: transform; }
  #sun { position: absolute; right: 90px; top: 45px; width: 110px; height: 110px; border-radius: 50%; background: #ffd60a; box-shadow: 0 0 60px 22px rgba(255,214,10,.55); }
  #road.sunset #sun { background: #ff9e00; box-shadow: 0 0 70px 28px rgba(255,120,0,.55); top: 130px; }
  #road.night #sun { background: #f1faee; box-shadow: 0 0 40px 14px rgba(240,250,240,.35); }
  .cloud { position: absolute; background: #fff; border-radius: 60px; opacity: .9; }
  #road.night .cloud { opacity: .25; }
  .cloud::before, .cloud::after { content: ""; position: absolute; background: #fff; border-radius: 50%; }
  .cloud::before { width: 55%; height: 160%; left: 12%; bottom: 25%; }
  .cloud::after { width: 45%; height: 130%; right: 12%; bottom: 30%; }
  #skyStars { display: none; position: absolute; inset: 0; }
  #road.night #skyStars { display: block; }
  #weather { position: absolute; inset: 0; pointer-events: none; z-index: 17; }
  /* snow world: mud reads wrong on white — puddles become blue-gray slush */
  #road.w5 .puddle ellipse { fill: #9db4c0; }
  #road.w5 .puddle ellipse + ellipse { fill: #c3d5de; }
  #road.w5 .puddle .splash path { stroke: #c3d5de; }
  #road.w5 .mudSpots circle { fill: #9db4c0; }

  #roadStrip {
    position: absolute; left: 0; width: 100%; top: 460px; height: 230px;
    background: #495057; border-top: 8px solid #343a40;
  }
  #roadStrip::before {
    content: ""; position: absolute; left: 0; width: 100%; top: 62px; height: 10px;
    background: repeating-linear-gradient(90deg, #ffd60a 0 60px, transparent 60px 120px);
  }
  #roadStrip::after {
    content: ""; position: absolute; left: 0; width: 100%; top: 128px; height: 10px;
    background: repeating-linear-gradient(90deg, #ffd60a 0 60px, transparent 60px 120px);
  }
  #dirt { position: absolute; left: 0; width: 100%; top: 690px; height: 10px; background: #8a5a2b; }

  .prop { position: absolute; }
  .cone { transition: transform .5s ease; transform-origin: bottom center; }
  .cone.knocked { transform: rotate(78deg) translateX(26px); }
  .star { transition: transform .4s ease, opacity .4s ease; }
  .star.collected { transform: scale(2.2); opacity: 0; }
  .puddle .splash { opacity: 0; transition: opacity .15s; }
  .puddle.splashing .splash { opacity: 1; }
  /* a bonked barrel/rock hops off the road instead of sitting inside the car */
  .prop.hit { animation: propAway .7s ease forwards; }
  @keyframes propAway {
    30% { transform: translate(46px, -120px) rotate(140deg); opacity: 1; }
    100% { transform: translate(110px, 60px) rotate(330deg); opacity: 0; }
  }
  #road.quake { animation: quake .3s ease; }
  @keyframes quake {
    15% { transform: translate(5px, 7px); } 30% { transform: translate(-6px, -5px); }
    45% { transform: translate(4px, -3px); } 60% { transform: translate(-3px, 4px); }
    75% { transform: translate(2px, -2px); } 90% { transform: translate(-1px, 1px); }

  #carWrap { position: absolute; left: 135px; width: 330px; will-change: transform; cursor: pointer; touch-action: none; transform-origin: 50% 90%; }
  #carWrap svg { width: 100%; height: auto; overflow: visible; }
  #carWrap.wobble svg { animation: carWobble .55s ease; }

  #carWrap.spin svg { animation: spin360 .65s ease; }

  .dmgSmoke circle { animation: puffUp 1.3s ease-in infinite; transform-box: fill-box; }
  @keyframes puffUp {
    0% { transform: translate(0,0) scale(.6); opacity: .85; }
    100% { transform: translate(-26px,-54px) scale(1.9); opacity: 0; }

  #homeBtn, #mapHomeBtn, #albumHomeBtn {
    position: absolute; left: 24px; top: 24px; width: 96px; height: 96px;

  #homeBtn svg, #mapHomeBtn svg, #albumHomeBtn svg { width: 56px; height: 56px; }

  #hudLevel { left: 136px; top: 24px; }
  #hudStars { right: 24px; top: 24px; }
  #hudDamage { right: 24px; top: 132px; }
  #hudDamage.hurt { border-color: #e63946; color: #e63946; }
  #hudProgress { left: 300px; top: 24px; padding: 0 20px; gap: 12px; }
  #progTrack { position: relative; width: 170px; height: 12px; background: #e9ecef; border-radius: 6px; }
  #progDot {
    position: absolute; top: -9px; left: 0; margin-left: -14px; width: 28px; height: 28px;
    border-radius: 50%; background: #e63946; border: 5px solid #fff;

  #hudProgress svg { width: 40px; height: 40px; }
  /* during the celebration the run HUD and controls step aside */
  #road.celebrating #hudStars, #road.celebrating #hudLevel, #road.celebrating #hudProgress,
  #road.celebrating #hudDamage, #road.celebrating .pedal, #road.celebrating .laneArrow,
  #road.celebrating #homeBtn { display: none; }
  #garageWallet { right: 24px; top: 24px; cursor: pointer; }
  #albumWallet { right: 24px; top: 24px; }
  #mapWallet { right: 24px; top: 24px; }

  .pedal {
    position: absolute; bottom: 26px; border-radius: 50%; border: 10px solid #fff;
    display: flex; align-items: center; justify-content: center; z-index: 20;
    box-shadow: 0 8px 0 rgba(0,0,0,.35); cursor: pointer; touch-action: none;
    transition: transform .08s;
  }
  .pedal { opacity: .87; }   /* lane-2 props stay readable behind the pedals */
  .pedal.held { transform: scale(.92); box-shadow: 0 3px 0 rgba(0,0,0,.35); }
  #gasPedal.nudge { animation: pulse 1.1s ease infinite; }
  #gasPedal { right: 30px; width: 170px; height: 170px; background: #38b000; }
  #gasPedal svg { width: 90px; height: 90px; }
  #brakePedal { right: 225px; bottom: 32px; width: 140px; height: 140px; background: #e63946; }
  #brakePedal svg { width: 76px; height: 76px; }

  .laneArrow {
    position: absolute; left: 20px; width: 96px; height: 96px; border-radius: 50%;
    background: #219ebc; border: 8px solid #bde0fe; z-index: 20;
  }
  .laneArrow svg { width: 54px; height: 54px; }
  #laneUp { bottom: 186px; }
  #laneDown { bottom: 66px; }
  /* soft control gutters lift the touch layer off the game world */
  #road::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 150px; z-index: 15;
    background: linear-gradient(90deg, rgba(0,0,0,.16), transparent); pointer-events: none;
  }
  .celebrating#road::before { display: none; }

  /* ---------- CELEBRATION ---------- */
  #celebrate {
    position: absolute; inset: 0; display: none; z-index: 30;
    background: rgba(2,48,71,.55); align-items: center; justify-content: center;
    flex-direction: column; gap: 34px;
  }
  #celebrate.active { display: flex; }
  #celebrateWallet { position: absolute; right: 24px; top: 24px; }
  /* one anchored results card instead of parts floating on the scrim */
  #resultsCard {
    background: #fdf6ea; border: 8px solid #ffb703; border-radius: 32px;
    padding: 26px 44px; display: flex; flex-direction: column; gap: 20px; align-items: center;
    box-shadow: 0 8px 0 rgba(63,50,34,.2);
  }
  #celebrate.active #resultsCard { animation: popIn .35s cubic-bezier(.2,1.6,.4,1) backwards; }
  #resultsMeta { display: flex; gap: 18px; }
  #resultsCard .chip { position: static; box-shadow: none; }
  #celebrateDamage { position: static; }
  #celebrateDamage.clean { border-color: #38b000; color: #38b000; }
  #celebrateDamage .medal { display: flex; }
  #celebrateDamage .medal svg { width: 68px; height: 68px; animation: medalPop .5s cubic-bezier(.2,2,.4,1) .4s backwards; }
  @keyframes medalPop { 0% { transform: scale(0) rotate(-180deg); } 100% { transform: scale(1) rotate(0); } }
  .lvlBtn .tierBadge {
    position: absolute; right: -8px; top: -12px; width: 34px; height: 34px;
  }
  .lvlBtn .tierBadge svg { width: 34px; height: 34px; }
  .flyStar {
    position: absolute; width: 44px; height: 44px; z-index: 40; pointer-events: none;
    transition: transform .55s cubic-bezier(.45,.1,.6,1), opacity .55s;
  }
  .flyStar svg { width: 100%; height: 100%; }
  #tallyChip {
    position: static; height: 130px; border-radius: 34px; padding: 0 36px;
    font-size: 64px; gap: 16px; border-width: 8px;
  }
  #tallyChip svg { width: 76px; height: 76px; }
  #ratingRow { display: flex; gap: 18px; }
  #ratingRow .rateStar { width: 104px; height: 104px; opacity: .25; transform: scale(.6); }
  #ratingRow .rateStar.lit { opacity: 1; transform: scale(1); transition: transform .3s cubic-bezier(.2,2,.4,1), opacity .2s; }
  #celebrateRow { display: flex; gap: 30px; align-items: center; }
  #replayBtn, #celebrateHomeBtn { width: 150px; height: 150px; border-radius: 50%; background: #219ebc; border: 10px solid #fff; }
  #replayBtn svg, #celebrateHomeBtn svg { width: 80px; height: 80px; }
  #nextBtn {
    width: 220px; height: 220px; border-radius: 50%; background: #38b000;
    border: 12px solid #d8f3dc; animation: pulse 1.1s ease infinite;
  }
  #nextBtn svg { width: 110px; height: 110px; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.09); } }
  .confetti {
    position: absolute; top: -30px; width: 16px; height: 16px; z-index: 29;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(760px) rotate(var(--spin)); }
  }

  .spinner { animation: spin 1.2s linear infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .wheelrot { transform-box: fill-box; transform-origin: center; }

  /* ---------- GAME FEEL (T4.5) ---------- */
  #carWrap svg.land { animation: landSquash .4s ease; }
  @keyframes landSquash {
    0% { transform: scale(1.07, .86); }
    45% { transform: scale(.96, 1.05); }
    100% { transform: scale(1, 1); }
  }
  .dust {
    position: absolute; width: 22px; height: 22px; border-radius: 50%;
    background: #d9c8a9; pointer-events: none; z-index: 16;
    animation: dustPuff .55s ease-out forwards;
  }
  @keyframes dustPuff {
    0% { transform: translate(0,0) scale(.5); opacity: .85; }
    100% { transform: translate(-46px,-30px) scale(1.9); opacity: 0; }
  }
  #speedLines { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity .35s; z-index: 16; }
  #speedLines div {
    position: absolute; height: 5px; border-radius: 3px; width: 190px;
    background: #ffffffbb; animation: streak .32s linear infinite;
  }
  #speedLines div:nth-child(1) { top: 470px; animation-delay: 0s; }
  #speedLines div:nth-child(2) { top: 560px; animation-delay: .12s; }
  #speedLines div:nth-child(3) { top: 640px; animation-delay: .22s; }
  @keyframes streak { from { transform: translateX(1300px); } to { transform: translateX(-400px); } }
  #iris {
    position: absolute; inset: 0; background: #023047; z-index: 60;
    pointer-events: none; opacity: 0;
  }
  #iris.go { animation: irisReveal .45s ease-out; }
  @keyframes irisReveal {
    0% { clip-path: circle(120% at 50% 50%); opacity: 1; }
    100% { clip-path: circle(0% at 50% 50%); opacity: 1; }
  }
  #rotateOverlay {
    position: fixed; inset: 0; background: #1a2634; z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  @media (orientation: portrait) { #rotateOverlay { display: flex; } }
  #rotateOverlay svg { width: 200px; height: 200px; animation: rotateHint 1.6s ease infinite; }
  @keyframes rotateHint { 0%,100% { transform: rotate(0); } 55%,75% { transform: rotate(90deg); } }
  #goBtn.nudge { animation: pulse 1.1s ease infinite; }
  #celebrateTime { position: static; }
  #celebrateTime .medal { display: flex; }
  #celebrateTime .medal svg { width: 68px; height: 68px; animation: medalPop .5s cubic-bezier(.2,2,.4,1) .4s backwards; }
  #celebrateRow { opacity: 0; pointer-events: none; transform: translateY(30px); transition: opacity .35s, transform .35s; }
  #celebrateRow.ready { opacity: 1; pointer-events: auto; transform: none; }

/* ============ TOYBOX DESIGN SYSTEM (T7, agent-generated layer) ============ */
/* ============================================================
   VROOM DESIGN SYSTEM — "Toybox" layer (Animal Crossing school)
   Drop-in override sheet. Append AFTER the existing <style> rules;
   later rules win the cascade. No new class names — only selectors
   that already exist in index.html.
   ============================================================ */

/* ---------- 1. TOKENS ---------- */
:root {
  /* surfaces (warm cream paper) */
  --v-surface: #fff8ec;
  --v-surface-2: #f6e9d2;
  --v-surface-line: #e6d2ab;      /* soft outline = darker shade of cream */
  --v-surface-down: #d9c193;      /* flat press shadow for cream */

  /* ink (warm brown, never navy/black) */
  --v-ink: #5a4634;
  --v-ink-strong: #4a3826;
  --v-ink-soft: #8a7360;

  /* wood */
  --v-wood: #c9a476;
  --v-wood-deep: #a8804e;
  --v-wood-dark: #6e5233;
  --v-wood-line: #8a6538;

  /* accents — each fill ships with its own soft outline + flat shadow */
  --v-accent-green: #74c465;  --v-green-line: #4e9a45;  --v-green-down: #438a3b;
  --v-accent-red:   #ef7d6d;  --v-red-line:   #c95a4c;  --v-red-down:   #b34e41;
  --v-accent-blue:  #6fc0df;  --v-blue-line:  #4a94b5;  --v-blue-down:  #3f83a2;
  --v-accent-yellow:#ffd66e;  --v-yellow-line:#dca63f;  --v-yellow-down:#c69334;

  /* muted / locked (warm putty, replaces cold gray) */
  --v-mute: #cfc0a6;  --v-mute-line: #b1a082;  --v-mute-down: #a3916d;

  /* per-purpose radii */
  --v-r-sm: 16px;      /* pips, small tags */
  --v-r-md: 22px;      /* standard square buttons */
  --v-r-lg: 30px;      /* chips, chunky buttons, toasts */
  --v-r-xl: 38px;      /* panels */
  --v-r-round: 50%;

  /* shadow tokens — flat, never blurred */
  --v-shadow-soft: 0 5px 0 rgba(74, 53, 35, .18);   /* over unknown fills */
  --v-shadow-card: 0 6px 0 rgba(74, 53, 35, .14);
  --v-outline-soft: rgba(74, 53, 35, .22);           /* translucent 2-tone edge for JS-tinted fills */
  --v-scrim: rgba(64, 44, 28, .55);

  /* bgPattern utility — one dot texture, ~4% opacity, reused everywhere */
  --v-dots: radial-gradient(rgba(90, 70, 52, .05) 2.4px, transparent 2.6px);
  --v-dots-light: radial-gradient(rgba(255, 255, 255, .06) 2.4px, transparent 2.6px);
  --v-dots-size: 26px 26px;

  /* rounded friendly type */
  --v-font: ui-rounded, "SF Pro Rounded", "Arial Rounded MT Bold",
            "Hiragino Maru Gothic ProN", -apple-system, system-ui, sans-serif;
}

/* ---------- 2. GLOBAL WARMTH ---------- */
html, body { background: #2f241a; }               /* warm dark letterbox, was navy */
#iris { background: #3a2c1e; }                    /* scene-change wipe, warmed */
#rotateOverlay { background: #2f241a; }

/* ---------- 3. TYPOGRAPHY ---------- */
.chip, #garageSign, .upgPrice, .photoCap, .worldTab span, .lvlBtn, .profileSlot .plus {
  font-family: var(--v-font);
}
.chip, .chip span, .lvlBtn, .upgPrice {
  font-variant-numeric: tabular-nums;
  letter-spacing: .02em;
}

/* ---------- 4. BUTTON SYSTEM ---------- */
/* one consistent squash: down-and-flatten, shadow collapses to 1px.
   NOTE: many elements are "bigBtn <thing>" combos; every circle/slot shape
   re-asserts its own radius below so this base radius never flattens them. */
.bigBtn {
  border-radius: var(--v-r-md);
  box-shadow: 0 6px 0 rgba(74, 53, 35, .22);
  transition: transform .1s cubic-bezier(.34, 1.56, .64, 1), box-shadow .1s;
}
.bigBtn:active, .bigBtn.pressed {
  transform: translateY(5px) scale(.97, .94);
  box-shadow: 0 1px 0 rgba(74, 53, 35, .22);
}

/* icon ink: chrome icons drop navy for warm brown (fill/stroke attributes
   lose to CSS, so this legally recolors inline SVG chrome) */
.bigBtn [fill="#023047"], .chip [fill="#023047"] { fill: var(--v-ink-strong); }
.bigBtn [stroke="#023047"], .chip [stroke="#023047"] { stroke: var(--v-ink-strong); }
/* cold grays inside chrome (muted speaker, HUD flag pole) go warm too */
.bigBtn [fill="#6c757d"], .chip [fill="#6c757d"] { fill: var(--v-ink-soft); }

/* --- cream chrome (home/dice/album/quiet/profile) --- */
#homeBtn, #mapHomeBtn, #albumHomeBtn, #albumBtn, #diceBtn, #quietBtn {
  background: var(--v-surface);
  border: 6px solid var(--v-surface-line);
  border-radius: var(--v-r-lg);
  box-shadow: 0 6px 0 var(--v-surface-down);
}
#profileBtn {                                      /* circle — keep 50% radius */
  background: var(--v-surface);
  border: 6px solid var(--v-surface-line);
  box-shadow: 0 6px 0 var(--v-surface-down);
}

/* --- blue chrome --- */
#mapBtn, #bodyBtn, #wheelBtn, #copyCodeBtn, #pasteCodeBtn, #replayBtn, #celebrateHomeBtn {
  background: var(--v-accent-blue);
  border: 6px solid var(--v-blue-line);
  box-shadow: 0 6px 0 var(--v-blue-down);
}
#bodyBtn, #wheelBtn, #copyCodeBtn, #pasteCodeBtn { border-radius: var(--v-r-lg); }
.laneArrow {
  background: var(--v-accent-blue);
  border: 7px solid var(--v-blue-line);
  border-radius: var(--v-r-round);
  box-shadow: 0 6px 0 var(--v-blue-down);
}

/* --- green = GO --- */
#goBtn, #freeBtn, #nextBtn, #importYes {
  background: var(--v-accent-green);
  border-color: var(--v-green-line);
  box-shadow: 0 7px 0 var(--v-green-down);
}
#goBtn, #importYes { border-width: 8px; }
#nextBtn { border-width: 10px; }
#freeBtn { border-width: 6px; border-style: solid; border-radius: var(--v-r-lg); }
#goBtn.locked {
  background: var(--v-mute);
  border-color: var(--v-mute-line);
  box-shadow: 0 7px 0 var(--v-mute-down);
}

/* --- red = stop / careful --- */
#importNo {
  background: var(--v-accent-red);
  border: 8px solid var(--v-red-line);
  box-shadow: 0 7px 0 var(--v-red-down);
}
#repairBtn {
  background: var(--v-accent-red);
  border: 7px solid var(--v-red-line);
  box-shadow: 0 6px 0 var(--v-red-down);
}

/* --- pedals: same language, darker-shade rings instead of white --- */
.pedal { box-shadow: 0 8px 0 rgba(74, 53, 35, .22); }
#gasPedal {
  background: var(--v-accent-green);
  border: 10px solid var(--v-green-line);
  box-shadow: 0 8px 0 var(--v-green-down);
}
#gasPedal.held { box-shadow: 0 3px 0 var(--v-green-down); }
#brakePedal {
  background: var(--v-accent-red);
  border: 10px solid var(--v-red-line);
  box-shadow: 0 8px 0 var(--v-red-down);
}
#brakePedal.held { box-shadow: 0 3px 0 var(--v-red-down); }

/* --- upgrades: wood tool-rack --- */
.upgBtn {
  background: var(--v-wood-deep);
  border: 5px solid var(--v-wood-line);
  border-radius: var(--v-r-md);
  box-shadow: 0 6px 0 var(--v-wood-dark);
}
.upgBtn.maxed {
  background: var(--v-accent-green);
  border-color: var(--v-green-line);
  box-shadow: 0 6px 0 var(--v-green-down);
}
.pips i { background: rgba(74, 53, 35, .35); }
.pips i.on { background: var(--v-accent-yellow); }

/* --- extras --- */
.extraBtn {
  background: var(--v-wood-deep);
  border: 5px solid var(--v-wood-line);
  border-radius: var(--v-r-md);
  box-shadow: 0 5px 0 var(--v-wood-dark);
}
.extraBtn.on {
  background: var(--v-accent-green);
  border-color: var(--v-accent-yellow);
  box-shadow: 0 5px 0 var(--v-green-down);
}

/* --- paint swatches: white ring stays (they ARE the color), warm shadow --- */
.swatch {
  border: 5px solid rgba(255, 248, 236, .9);
  box-shadow: 0 4px 0 rgba(74, 53, 35, .25);
}
.swatch.selected { border-color: var(--v-accent-yellow); }

/* --- price tag: putty until affordable, then green --- */
#priceTag {
  background: var(--v-mute);
  border: 6px solid var(--v-mute-line);
  border-radius: var(--v-r-lg);
  color: var(--v-ink);
  box-shadow: 0 6px 0 var(--v-mute-down);
}
#priceTag.afford {
  background: var(--v-accent-green);
  border-color: var(--v-green-line);
  color: #fff;
  box-shadow: 0 6px 0 var(--v-green-down);
}

/* --- locks --- */
#previewLock { background: var(--v-wood-dark); border: 6px solid var(--v-accent-yellow); }
.swatch .lockDot, .lvlBtn .lockDot { background: var(--v-wood-dark); }

/* ---------- 5. CHIPS (HUD / wallets / tallies) ---------- */
.chip {
  background: var(--v-surface);
  border: 6px solid var(--v-surface-line);
  border-radius: var(--v-r-lg);
  color: var(--v-ink);
  box-shadow: 0 5px 0 var(--v-surface-down);
}
#hudDamage.hurt { border-color: var(--v-red-line); color: #c9584a; }
#celebrateDamage.clean { border-color: var(--v-green-line); color: #3f8a38; }
#progTrack { background: var(--v-surface-2); }
#progDot { background: var(--v-accent-red); border: 5px solid var(--v-surface); }

/* squashier pop for chips (existing hook, retuned) */
@keyframes chipPop {
  35% { transform: scale(1.15, 1.06); }
  70% { transform: scale(.97, 1.02); }
}

/* ---------- 6. SCENE DRESSING ---------- */

/* --- garage: warm workshop --- */
#garage {
  background: linear-gradient(#b7e3f4 0%, #e6f6fc 54%, #c9a476 54%, #a17847 100%);
}
/* horizontal floor planks */
#garage::before {
  content: ""; position: absolute; left: 0; right: 0; top: 385px; bottom: 0;
  pointer-events: none;
  background: repeating-linear-gradient(to bottom,
    rgba(94, 68, 41, .12) 0 3px, transparent 3px 46px);
}
/* soft warm vignette (under all controls: they sit at z-index 5+) */
#garage::after {
  content: ""; position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse 85% 78% at 50% 42%,
    transparent 58%, rgba(94, 68, 41, .14) 100%);
}
#garageWall {
  background-color: #fbf1da;
  background-image: var(--v-dots);
  background-size: var(--v-dots-size);
  border: 8px solid var(--v-surface-line);
  border-bottom: none;
  border-radius: var(--v-r-md) var(--v-r-md) 0 0;
}
#garageWall::before {          /* bunting stripe, pastel instead of hazard-orange */
  background: repeating-linear-gradient(90deg, #ffd98c 0 40px, #ffb98a 40px 80px);
}
#garageFloor { background: #b8905c; border-top: 6px solid #97744a; }
#garageSign {
  background: var(--v-wood-dark);
  color: #ffe6a8;
  border: 5px solid #57402a;
  box-shadow: 0 4px 0 #57402a;
}

/* --- controls: wood workbench, was navy --- */
#controls {
  background-color: #c19664;
  background-image:
    repeating-linear-gradient(90deg, rgba(94, 68, 41, .10) 0 3px, transparent 3px 150px),
    linear-gradient(#cda97c, #b28a58);
  border-top: 8px solid #e6cb98;   /* light rim = tabletop edge highlight */
}

/* --- map: park meadow --- */
#map {
  background: linear-gradient(#aadcf0 0%, #dbf2fb 56%, #a9d88e 56%, #7fbb66 100%);
}
#map::before {                     /* paper grain + soft clearing + mown-grass path */
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image:
    var(--v-dots-light),
    radial-gradient(ellipse 46% 24% at 50% 62%, rgba(255, 248, 236, .30), transparent 72%),
    repeating-linear-gradient(100deg, rgba(255, 255, 255, .05) 0 36px, transparent 36px 72px);
  background-size: 30px 30px, 100% 100%, 100% 44%;
  background-position: 0 0, 0 0, 0 100%;
  background-repeat: repeat, no-repeat, no-repeat;
}
#map::after {
  content: ""; position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse 85% 78% at 50% 45%,
    transparent 60%, rgba(64, 84, 48, .13) 100%);
}
.worldTab {
  background: var(--v-accent-blue);
  border: 5px solid var(--v-outline-soft);   /* translucent: survives JS world tints */
  border-radius: var(--v-r-md);
  box-shadow: 0 5px 0 rgba(74, 53, 35, .25);
}
.worldTab.sel { outline: 6px solid var(--v-accent-yellow); }
.worldTab.locked { background: var(--v-mute); }
.lvlBtn {
  border: 5px solid var(--v-outline-soft);
  border-radius: var(--v-r-lg);
  box-shadow: 0 6px 0 rgba(74, 53, 35, .25);
}
.lvlBtn.open { background: var(--v-accent-blue); }
.lvlBtn.done { background: var(--v-accent-green); }
.lvlBtn.locked { background: var(--v-mute); }
.lvlBtn.locked.sunset { background: #bd8f6d; }
.lvlBtn.locked.night { background: #8b90ac; }
.lvlBtn.current { outline: 6px solid var(--v-accent-yellow); }

/* --- album: same paper, harmonized to token set --- */
#album {
  background-color: var(--v-surface);
  background-image: var(--v-dots), linear-gradient(#fff8ec, #f3e4c8);
  background-size: var(--v-dots-size), 100% 100%;
}
#album::before { border-color: rgba(216, 185, 140, .45); border-radius: var(--v-r-lg); }
.buddySlot, .badgeSlot {
  background: rgba(90, 70, 52, .07);
  border: 5px dashed rgba(138, 115, 96, .55);
}
.buddySlot { border-radius: var(--v-r-round); }
.badgeSlot { border-radius: var(--v-r-lg); }
.buddySlot.filled, .badgeSlot.filled {
  background: var(--v-surface);
  border-color: var(--v-accent-yellow);
  box-shadow: 0 4px 0 rgba(74, 53, 35, .15);
}
.buddySlot.equipped { outline: 6px solid var(--v-accent-green); }
.photoSlot { background: #fffdf6; border-radius: 10px; box-shadow: 0 5px 0 rgba(74, 53, 35, .16); }
.photoSlot.empty { background: rgba(90, 70, 52, .07); border: 5px dashed rgba(138, 115, 96, .55); box-shadow: none; }
.photoCap { color: var(--v-ink); }

/* ---------- 7. OVERLAYS + PANELS ---------- */
#profileOverlay { background: var(--v-scrim); }
#celebrate { background: var(--v-scrim); }
#importConfirm { background: rgba(64, 44, 28, .65); }

#profilePanel {
  background-color: var(--v-surface);
  background-image: var(--v-dots);
  background-size: var(--v-dots-size);
  border: 8px solid var(--v-wood);
  border-radius: var(--v-r-xl);
  box-shadow: 0 8px 0 rgba(74, 53, 35, .25);
}
.profileSlot {
  background: var(--v-surface);
  border: 7px solid var(--v-surface-line);
  border-radius: var(--v-r-round);
  box-shadow: 0 4px 0 var(--v-surface-down);
}
.profileSlot.empty {
  background: rgba(90, 70, 52, .07);
  border-style: dashed;
  border-color: rgba(138, 115, 96, .6);
  box-shadow: none;
}
.profileSlot.activeP { outline: 7px solid var(--v-accent-green); }
.profileSlot .plus { color: var(--v-ink-soft); }
#qrBox { border: 5px solid var(--v-surface-line); border-radius: var(--v-r-sm); }

#stickerToast {
  background: var(--v-surface);
  border: 6px solid var(--v-accent-yellow);
  border-radius: var(--v-r-lg);
  box-shadow: 0 6px 0 var(--v-surface-down);
}

#tallyChip { border-radius: var(--v-r-xl); }

/* ---------- 8. ENTRANCE ANIMATION ---------- */
/* the game already defines `@keyframes popIn` (scale .5 -> 1.06 -> 1, with
   opacity) for its .enter choreography — reuse it rather than redefining,
   so every entrance in the game shares one pop */
#profileOverlay.show #profilePanel {
  animation: popIn .35s cubic-bezier(.2, 1.4, .4, 1) both;
}
#importConfirm.show #importYes,
#importConfirm.show #importNo {
  animation: popIn .35s cubic-bezier(.2, 1.4, .4, 1) both;
}
/* celebrate children pop in with a gentle stagger;
   #celebrateRow keeps its own .ready reveal mechanic untouched */
#celebrate.active > :not(#celebrateRow) {
  animation: popIn .4s cubic-bezier(.2, 1.4, .4, 1) backwards;
}
#celebrate.active > :nth-child(2) { animation-delay: .05s; }
#celebrate.active > :nth-child(3) { animation-delay: .10s; }
#celebrate.active > :nth-child(4) { animation-delay: .15s; }
#celebrate.active > :nth-child(5) { animation-delay: .20s; }

/* toast keeps translateX centering inside its own pop */
@keyframes toastPop {
  0%   { transform: translateX(-50%) scale(.5);  opacity: 0; }
  65%  { transform: translateX(-50%) scale(1.06); opacity: 1; }
  100% { transform: translateX(-50%) scale(1);   opacity: 1; }
}
#stickerToast.show {
  animation: toastPop .45s cubic-bezier(.2, 1.4, .4, 1) both;
}


/* ---- T7 reconciliation: rules that must win over the toybox layer ---- */
/* SPEC floor: 76px stage = 64.8px rendered at iPad landscape scale */
.swatch { width: 76px; height: 76px; }
#swatches { grid-template-columns: repeat(4, 76px); grid-template-rows: repeat(3, 76px); }

/* ---- car wash mini-game ---- */
#washOverlay {
  position: absolute; inset: 0; z-index: 80; display: none;
  background: rgba(64,44,28,.55); align-items: center; justify-content: center;
}
#washOverlay.show { display: flex; }
#washCard {
  background: #fff8ec; border: 8px solid #6fc0df; border-radius: 38px;
  padding: 30px 40px 24px; display: flex; flex-direction: column; gap: 16px; align-items: center;
  animation: popIn .35s cubic-bezier(.2,1.6,.4,1) backwards;
}
#washCar { width: 560px; cursor: pointer; touch-action: none; position: relative; }
#washCar svg { width: 100%; height: auto; overflow: visible; }
#washMeter { width: 420px; height: 22px; background: #f6e9d2; border-radius: 11px; overflow: hidden; }
#washFill { height: 100%; width: 0%; background: #6fc0df; border-radius: 11px; transition: width .15s; }
.bubble {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 82;
  background: radial-gradient(circle at 35% 35%, #ffffff, #d9f1fb 60%, #9ad6ef);
  animation: bubbleUp .9s ease-out forwards;
}
@keyframes bubbleUp {
  0% { transform: translateY(0) scale(.5); opacity: .95; }
  100% { transform: translateY(-70px) scale(1.25); opacity: 0; }
}
#washCard.rinsing #washCar svg { animation: rinseShake .5s ease; }
@keyframes rinseShake { 25% { transform: rotate(-2deg); } 65% { transform: rotate(2deg); } }
</style>
</head>

<script>
"use strict";

/* ============ STAGE SCALING ============ */
const stage = document.getElementById("stage");
function fit() {
  const s = Math.min(innerWidth / 1200, innerHeight / 700);
  stage.style.transform = `translate(-50%,-50%) scale(${s})`;
}
addEventListener("resize", fit);
addEventListener("orientationchange", () => { fit(); setTimeout(fit, 350); });
if (window.visualViewport) visualViewport.addEventListener("resize", fit);
fit();

/* ============ CATALOG + ECONOMY ============ */
const COLORS = ["#e53935", "#1e88e5", "#fdd835", "#43a047", "#fb8c00", "#ec407a",
                "#8e24aa", "#00acc1", "#9ccc65", "#f5f5f5", "#37474f", "rainbow"];
let BODY_ORDER = ["dump", "digger", "mixer", "fire", "monster", "police", "race", "tractor", "icecream", "rocket", "ufo"];
let WHEEL_ORDER = ["normal", "monster", "racing", "gold", "flower", "tank"];
const PRICES = {
  body:   { police: 25, race: 40, tractor: 60, icecream: 80, rocket: 120, ufo: 200 },
  wheels: { gold: 30, flower: 50, tank: 70 },
  color:  { "#8e24aa": 10, "#00acc1": 10, "#9ccc65": 15, "#f5f5f5": 15, "#37474f": 20, "rainbow": 60 },
  decal:  { flame: 30, star: 20, heart: 20, bolt: 40, eyes: 50 }
};
/* side-of-the-truck sticker decals, tap-cycled like body/wheels ("none" is free) */
const DECAL_ORDER = ["none", "flame", "star", "heart", "bolt", "eyes"];
const DECAL_SVG = {
  flame: `<path d="M0 14 Q-14 6 -10 -8 Q-6 -16 0 -20 Q-2 -10 4 -8 Q2 -18 10 -22 Q8 -10 14 -6 Q18 4 8 12 Q4 16 0 14 Z" fill="#ff9f1c" stroke="#e76f51" stroke-width="2.5"/><path d="M0 8 Q-6 2 -2 -6 Q2 -10 4 -4 Q8 0 4 6 Q2 10 0 8 Z" fill="#ffd60a"/>`,
  star:  `<path d="M0 -18 L5 -6 L18 -5 L8 4 L11 17 L0 10 L-11 17 L-8 4 L-18 -5 L-5 -6 Z" fill="#ffd60a" stroke="#fb8500" stroke-width="2.5"/>`,
  heart: `<path d="M0 14 Q-18 2 -14 -8 Q-10 -16 0 -8 Q10 -16 14 -8 Q18 2 0 14 Z" fill="#ef7d6d" stroke="#c95a4c" stroke-width="2.5"/>`,
  bolt:  `<path d="M4 -20 L-12 4 L-2 4 L-6 20 L12 -6 L2 -6 Z" fill="#ffd60a" stroke="#fb8500" stroke-width="2.5"/>`,
  eyes:  `<circle cx="-9" cy="0" r="9" fill="#fff" stroke="#5a4634" stroke-width="2.5"/><circle cx="9" cy="0" r="9" fill="#fff" stroke="#5a4634" stroke-width="2.5"/><circle cx="-6" cy="2" r="4" fill="#212529"/><circle cx="12" cy="2" r="4" fill="#212529"/>`
};
function priceOf(kind, id) { return (PRICES[kind] && PRICES[kind][id]) || 0; }
function owns(kind, id) { return priceOf(kind, id) === 0 || progress.owned[kind].includes(id); }

/* upgrade tracks: 3 levels each; repair costs 2 stars per damage point */
const UPG = {
  engine: { prices: [20, 40, 80] },   /* +80 top speed per level */
  armor:  { prices: [20, 40, 80] },   /* soaks 1 damage per hit per level */
  magnet: { prices: [15, 30, 60] }    /* wider star pull per level */
};
const MAX_DAMAGE = 9, REPAIR_RATE = 2;

const MAX_LEVEL = 80;
const WORLD_COUNT = 8, WORLD_SIZE = 10;
/* world-specific hazards; the art + specs are filled in by the worlds pack below */
const WORLD_ITEMS = { 5: ["ice", "snowman"], 6: ["cactus", "tumbleweed"], 7: ["sandcastle", "crab"], 8: ["crater", "alien"] };
const EXTRA_PROPS = {};   /* type -> { svg, xOff, yOff, hard, mv } */
function worldOf(n) { return Math.min(WORLD_COUNT, Math.ceil(n / WORLD_SIZE)); }
/* level length climbs steeply through world 2, then gently — runs stay under ~25s */
function levelLen(n) { return 3500 + Math.min(n, 20) * 250 + Math.max(0, n - 20) * 100; }

/* time-trial medals: S needs a near-clean full-throttle run (upgrades help late game) */
const TIER_RANK = { S: 3, A: 2, B: 1, C: 0 };
const TIER_COLOR = { S: "#ffd60a", A: "#cfd8dc", B: "#cd7f32", C: "#90a4ae" };
/* forgiving early (a wobbly level-1 run can still S), mastery-tuned late
   (deep worlds assume engine upgrades and a near-clean line) */
function timeTier(n, t) {
  const len = levelLen(n);
  if (t <= len / (500 + n * 8)) return "S";
  if (t <= len / (400 + n * 6)) return "A";
  if (t <= len / (300 + n * 4)) return "B";
  return "C";
}
const stopwatchIcon = `<svg viewBox="0 0 64 64"><circle cx="32" cy="36" r="24" fill="#fff" stroke="#023047" stroke-width="6"/><path d="M32 36 V22 M32 36 L42 42" stroke="#e63946" stroke-width="5" stroke-linecap="round"/><path d="M26 8 H38 M32 8 V12" stroke="#023047" stroke-width="6" stroke-linecap="round"/></svg>`;

/* "first time!" sticker badges — earned once, live in the album */
const BADGES = [
  { id: "jump",  icon: `<svg viewBox="0 0 64 64"><path d="M4 54 L34 42 L34 54 Z" fill="#e9c46a" stroke="#b08968" stroke-width="3"/><path d="M30 40 Q44 18 58 26" stroke="#4cc9f0" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="1 9"/><circle cx="58" cy="26" r="7" fill="#e63946"/></svg>` },
  { id: "clean", icon: `<svg viewBox="0 0 64 64"><path d="M32 4 L54 12 V30 Q54 48 32 58 Q10 48 10 30 V12 Z" fill="#bde0fe" stroke="#1d3557" stroke-width="4"/><path d="M20 30 L28 38 L44 20" stroke="#38b000" stroke-width="7" fill="none" stroke-linecap="round"/></svg>` },
  { id: "s",     icon: `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="#ffd60a" stroke="#023047" stroke-width="4"/><text x="32" y="44" text-anchor="middle" font-family="-apple-system,'Arial Rounded MT Bold',sans-serif" font-size="34" font-weight="900" fill="#023047">S</text></svg>` },
  { id: "world", icon: `<svg viewBox="0 0 64 64"><path d="M18 8 H46 V26 Q46 40 32 44 Q18 40 18 26 Z" fill="#ffd60a" stroke="#fb8500" stroke-width="3"/><path d="M18 12 Q6 14 12 26 Q15 32 20 32 M46 12 Q58 14 52 26 Q49 32 44 32" stroke="#fb8500" stroke-width="4" fill="none"/><rect x="26" y="44" width="12" height="8" fill="#b08968"/><rect x="20" y="52" width="24" height="6" rx="3" fill="#8a5a2b"/></svg>` },
  { id: "buy",   icon: `<svg viewBox="0 0 64 64"><path d="M8 24 L28 8 H52 V32 L32 52 Q28 56 24 52 L8 32 Q4 28 8 24 Z" fill="#ffb703" stroke="#023047" stroke-width="4"/><circle cx="42" cy="18" r="5" fill="#023047"/></svg>` },
  { id: "gag",   icon: `<svg viewBox="0 0 64 64"><ellipse cx="30" cy="44" rx="22" ry="13" fill="#ffd60a"/><circle cx="46" cy="26" r="12" fill="#ffd60a"/><path d="M56 24 L66 28 L56 32 Z" fill="#f77f00"/><circle cx="49" cy="23" r="2.5" fill="#023047"/></svg>` }
];
function medalSVG(tier) {
  /* the S coin is star-scalloped so the top tier reads by shape as well as letter */
  const burst = tier === "S"
    ? `<path d="${[...Array(10)].map((_, i) => {
        const a = i * Math.PI / 5 - Math.PI / 2, r = i % 2 ? 27 : 32;
        return (i ? "L" : "M") + (32 + Math.cos(a) * r).toFixed(1) + " " + (32 + Math.sin(a) * r).toFixed(1);
      }).join(" ")} Z" fill="#fb8500"/>`
    : "";
  return `<svg viewBox="0 0 64 64">${burst}<circle cx="32" cy="32" r="${tier === "S" ? 24 : 28}" fill="${TIER_COLOR[tier]}" stroke="#023047" stroke-width="4"/><text x="32" y="${tier === "S" ? 42 : 44}" text-anchor="middle" font-family="-apple-system,'Arial Rounded MT Bold',sans-serif" font-size="${tier === "S" ? 30 : 34}" font-weight="900" fill="#023047">${tier}</text></svg>`;
}

/* ============ STATE (vroom.v2, migrates v1 build) ============ */
let state = { body: "dump", wheels: "normal", color: "#fdd835", buddy: null, decal: "none", extras: { horn: false, beacon: false, flag: false } };
let progress = { wallet: 0, owned: { body: [], wheels: [], color: [], extras: [], buddy: [], decal: [] }, levels: {}, current: 1,
                 muddy: false,
                 damage: 0, upgrades: { engine: 0, armor: 0, magnet: 0 }, quiet: false,
                 badges: [], photos: [] };

/* ---- profiles: up to 3 kids, identified by a buddy-face avatar, no reading ---- */
const MAX_PROFILES = 3;
const AVATAR_IDS = ["pup", "kitty", "ducky", "dino", "penguin", "monkey"];   /* = BUDDY_ORDER, defined later */
let meta = { active: 0, avatars: ["pup", null, null] };
(function loadMeta() {
  try {
    const m = JSON.parse(localStorage.getItem("vroom.meta"));
    if (m && Number.isInteger(m.active) && Array.isArray(m.avatars)) {
      meta.active = Math.min(MAX_PROFILES - 1, Math.max(0, m.active));
      meta.avatars = [0, 1, 2].map(i => AVATAR_IDS.includes(m.avatars[i]) ? m.avatars[i] : (i === 0 ? "pup" : null));
    }
  } catch (e) {}
  /* migrate the single-profile era: vroom.v2 becomes profile 0 */
  try {
    if (localStorage.getItem("vroom.v2") && !localStorage.getItem("vroom.v2.p0")) {
      localStorage.setItem("vroom.v2.p0", localStorage.getItem("vroom.v2"));
      localStorage.removeItem("vroom.v2");
    }
  } catch (e) {}
  saveMeta();
})();
function saveMeta() { try { localStorage.setItem("vroom.meta", JSON.stringify(meta)); } catch (e) {} }
function saveKey() { return "vroom.v2.p" + meta.active; }
function switchProfile(i) {
  save();                 /* current kid's progress is already on its own key; just flip */
  meta.active = i;
  saveMeta();
  location.reload();      /* cleanest possible state swap for a single-file game */
}

function loadState() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(saveKey())); } catch (e) {}
  if (!saved && meta.active === 0) {
    /* migrate the kid's v1 build if present */
    try { const v1 = JSON.parse(localStorage.getItem("vroom.v1")); if (v1) saved = { build: v1 }; } catch (e) {}
  }
  if (!saved) return;
  const b = saved.build || {};
  if (BODY_ORDER.includes(b.body)) state.body = b.body;
  if (WHEEL_ORDER.includes(b.wheels)) state.wheels = b.wheels;
  if (COLORS.includes(b.color)) state.color = b.color;
  for (const k in state.extras) state.extras[k] = !!(b.extras && b.extras[k]);
  if (Number.isFinite(saved.wallet) && saved.wallet >= 0) progress.wallet = Math.floor(saved.wallet);
  if (saved.owned) for (const kind of ["body", "wheels", "color", "extras", "decal"]) {
    if (Array.isArray(saved.owned[kind])) progress.owned[kind] = saved.owned[kind].filter(id => priceOf(kind, id) > 0);
  }
  if (saved.levels) for (const n in saved.levels) {
    const lv = saved.levels[n], num = +n;
    if (num >= 1 && num <= MAX_LEVEL && lv && Number.isFinite(lv.best)) {
      progress.levels[num] = { best: lv.best, rating: Math.min(3, Math.max(1, lv.rating || 1)) };
      if (Number.isFinite(lv.bestTime) && lv.bestTime > 0) progress.levels[num].bestTime = lv.bestTime;
      if (TIER_RANK[lv.tier] !== undefined) progress.levels[num].tier = lv.tier;
    }
  }
  if (Number.isFinite(saved.current) && saved.current >= 1 && saved.current <= MAX_LEVEL) progress.current = Math.floor(saved.current);
  progress.quiet = !!saved.quiet;
  progress.muddy = !!saved.muddy;
  if (b.decal && DECAL_ORDER.includes(b.decal) && owns("decal", b.decal)) state.decal = b.decal;
  if (saved.owned && Array.isArray(saved.owned.buddy)) progress.owned.buddy = saved.owned.buddy.filter(id => BUDDY_ORDER.includes(id));
  if (b.buddy && BUDDY_ORDER.includes(b.buddy) && progress.owned.buddy.includes(b.buddy)) state.buddy = b.buddy;
  if (Array.isArray(saved.badges)) progress.badges = saved.badges.filter(id => BADGES.some(x => x.id === id));
  if (Array.isArray(saved.photos)) {
    progress.photos = saved.photos.slice(0, 6).filter(p =>
      p && p.b && p.b.extras && BODY_ORDER.includes(p.b.body) && WHEEL_ORDER.includes(p.b.wheels) && COLORS.includes(p.b.color));
  }
  if (Number.isFinite(saved.damage)) progress.damage = Math.min(MAX_DAMAGE, Math.max(0, Math.floor(saved.damage)));
  if (saved.upgrades) for (const k of ["engine", "armor", "magnet"]) {
    if (Number.isFinite(saved.upgrades[k])) progress.upgrades[k] = Math.min(3, Math.max(0, Math.floor(saved.upgrades[k])));
  }
  /* if the saved build uses a part that is no longer owned somehow, fall back */
  if (!owns("body", state.body)) state.body = "dump";
  if (!owns("wheels", state.wheels)) state.wheels = "normal";
  if (!owns("color", state.color)) state.color = "#fdd835";
}
function save() {
  try { localStorage.setItem(saveKey(), JSON.stringify({ build: state, ...progress })); } catch (e) {}
}

/* ============ AUDIO (all synthesized) ============ */
let actx = null, masterBus = null;
function unlockAudio() {
  try {
    if (!actx) {
      actx = new (window.AudioContext || window.webkitAudioContext)();
      /* one compressor on the way out so stacked sfx can't clip iPad speakers */
      masterBus = actx.createDynamicsCompressor();
      masterBus.threshold.value = -14;
      masterBus.knee.value = 20;
      masterBus.ratio.value = 8;
      masterBus.connect(actx.destination);
    }
    if (actx.state === "suspended") actx.resume();
  } catch (e) { /* stay silent for the session */ }
}
addEventListener("pointerdown", unlockAudio, { capture: true });

/* quiet mode: parent toggle scales every synthesized voice (car-friendly volume) */
function volScale() { return progress.quiet ? 0.22 : 1; }
function tone(type, f0, f1, dur, vol = 0.25, delay = 0) {
  if (!actx) return;
  vol *= volScale();
  const t = actx.currentTime + delay;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(masterBus);
  o.start(t); o.stop(t + dur + 0.02);
}
function noiseBurst(dur, freq, vol = 0.3, delay = 0) {
  if (!actx) return;
  vol *= volScale();
  const t = actx.currentTime + delay;
  const len = Math.max(1, Math.floor(actx.sampleRate * dur));
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f).connect(g).connect(masterBus);
  src.start(t);
}
const sfx = {

  buy()    { [659, 784, 988, 1319].forEach((f, i) => tone("triangle", f, f, 0.3, 0.24, i * 0.09)); noiseBurst(0.4, 4000, 0.08, 0.36); },
  tada()   { [523, 659, 784, 1047, 1319].forEach((f, i) => tone("triangle", f, f, 0.5, 0.22, i * 0.11)); noiseBurst(0.5, 4000, 0.1, 0.5); },

    if (body === "monster") { tone("sawtooth", 95, 80, 0.5, 0.4); tone("sawtooth", 98, 82, 0.5, 0.3); }

};

let engine = null;
function engineStart() {
  if (!actx || engine) return;
  /* two detuned saws through a speed-swept lowpass, plus a wind-noise layer at speed */
  const o = actx.createOscillator(), o2 = actx.createOscillator();
  const g = actx.createGain(), f = actx.createBiquadFilter();
  o.type = "sawtooth"; o.frequency.value = 45;
  o2.type = "sawtooth"; o2.frequency.value = 45; o2.detune.value = 9;
  f.type = "lowpass"; f.frequency.value = 260;
  g.gain.value = 0;
  o.connect(f); o2.connect(f);
  f.connect(g).connect(masterBus);
  o.start(); o2.start();
  const wlen = actx.sampleRate;
  const wbuf = actx.createBuffer(1, wlen, actx.sampleRate);
  const wd = wbuf.getChannelData(0);
  for (let i = 0; i < wlen; i++) wd[i] = Math.random() * 2 - 1;
  const wsrc = actx.createBufferSource(); wsrc.buffer = wbuf; wsrc.loop = true;
  const wf = actx.createBiquadFilter(); wf.type = "bandpass"; wf.frequency.value = 1100; wf.Q.value = 0.6;
  const wg = actx.createGain(); wg.gain.value = 0;
  wsrc.connect(wf).connect(wg).connect(masterBus);
  wsrc.start();
  engine = { o, o2, g, f, wsrc, wg };
}
function engineSet(v) {
  if (!engine) return;
  /* smooth ramps instead of per-frame .value writes (audible zipper otherwise) */
  const t = actx.currentTime;
  const fr = 45 + (v / 700) * 100;
  engine.o.frequency.setTargetAtTime(fr, t, 0.06);
  engine.o2.frequency.setTargetAtTime(fr, t, 0.06);
  engine.f.frequency.setTargetAtTime(260 + (v / 700) * 1100, t, 0.08);
  engine.g.gain.setTargetAtTime((v > 5 ? 0.055 : 0) * volScale(), t, 0.06);
  /* wind fades in over the top 40% of the speed range */
  const wind = Math.max(0, (v / vmaxEff()) - 0.6) * 0.11 * volScale();
  engine.wg.gain.setTargetAtTime(wind, t, 0.12);
}

  if (!owns("color", state.color)) out.push(["color", state.color]);

/* ============ PROFILES + SAVE CODES ============ */
const b64url = {
  enc(bytes) {
    let s = "";
    for (const b of bytes) s += String.fromCharCode(b);
    return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  },
  dec(str) {
    const s = atob(str.replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from(s, c => c.charCodeAt(0));
  }
};
/* paid-item orders are FROZEN for code compatibility — append only */
const CODE_BODIES = ["police", "race", "tractor", "icecream", "rocket", "ufo", "limo", "dragon", "train", "royal"];
const CODE_WHEELS = ["gold", "flower", "tank", "glow", "star"];
const CODE_COLORS = ["#8e24aa", "#00acc1", "#9ccc65", "#f5f5f5", "#37474f", "rainbow"];
const CODE_EXTRAS = ["wings", "booster", "partyhat"];
const CODE_BADGES = BADGES.map(b => b.id);
const CODE_DECALS = ["flame", "star", "heart", "bolt", "eyes"];

/* compact binary save: everything except photos + best times — small enough for a QR */
function packCompact() {
  const bits = [];
  const pushBits = (val, n) => { for (let i = n - 1; i >= 0; i--) bits.push((val >> i) & 1); };
  pushBits(2, 8);                                     /* format version (2 adds decals + mud) */
  pushBits(Math.min(65535, progress.wallet), 16);
  pushBits(progress.current, 8);
  pushBits(progress.damage, 4);
  pushBits(progress.quiet ? 1 : 0, 1);
  pushBits(state.buddy ? BUDDY_ORDER.indexOf(state.buddy) + 1 : 0, 3);
  pushBits(progress.upgrades.engine, 2); pushBits(progress.upgrades.armor, 2); pushBits(progress.upgrades.magnet, 2);
  pushBits(0, 2);                                     /* pad to byte */
  for (const [list, kind] of [[CODE_BODIES, "body"], [CODE_WHEELS, "wheels"], [CODE_COLORS, "color"], [CODE_EXTRAS, "extras"]]) {
    for (const id of list) pushBits(progress.owned[kind].includes(id) ? 1 : 0, 1);
  }
  for (const id of BUDDY_ORDER) pushBits(progress.owned.buddy.includes(id) ? 1 : 0, 1);
  for (const id of CODE_BADGES) pushBits(progress.badges.includes(id) ? 1 : 0, 1);
  while (bits.length % 8) pushBits(0, 1);
  for (let n = 1; n <= MAX_LEVEL; n++) {
    const lv = progress.levels[n];
    pushBits(lv ? lv.rating : 0, 2);
    pushBits(lv && lv.tier ? TIER_RANK[lv.tier] : 0, 2);
  }
  for (const id of CODE_DECALS) pushBits(progress.owned.decal.includes(id) ? 1 : 0, 1);
  pushBits(state.decal !== "none" ? DECAL_ORDER.indexOf(state.decal) : 0, 3);
  pushBits(progress.muddy ? 1 : 0, 1);
  const bytes = new Uint8Array(Math.ceil(bits.length / 8));
  bits.forEach((b, i) => { if (b) bytes[i >> 3] |= 128 >> (i & 7); });
  return "VROOM1." + b64url.enc(bytes);
}
function unpackCompact(code) {
  const bytes = b64url.dec(code);
  let pos = 0;
  const read = n => { let v = 0; for (let i = 0; i < n; i++) { v = (v << 1) | ((bytes[pos >> 3] >> (7 - (pos & 7))) & 1); pos++; } return v; };
  const ver = read(8);
  if (ver !== 1 && ver !== 2) return null;
  const out = {
    build: { body: "dump", wheels: "normal", color: "#fdd835", buddy: null, decal: "none", extras: { horn: false, beacon: false, flag: false } },
    wallet: read(16), current: read(8),
    damage: read(4), quiet: !!read(1),
    owned: { body: [], wheels: [], color: [], extras: [], buddy: [], decal: [] },
    levels: {}, badges: [], photos: [],
    upgrades: null
  };
  const buddyIdx = read(3);
  out.upgrades = { engine: read(2), armor: read(2), magnet: read(2) };
  read(2);
  for (const [list, kind] of [[CODE_BODIES, "body"], [CODE_WHEELS, "wheels"], [CODE_COLORS, "color"], [CODE_EXTRAS, "extras"]]) {
    for (const id of list) if (read(1)) out.owned[kind].push(id);
  }
  for (const id of BUDDY_ORDER) if (read(1)) out.owned.buddy.push(id);
  for (const id of CODE_BADGES) if (read(1)) out.badges.push(id);
  while (pos % 8) read(1);
  const TIER_OF = ["C", "B", "A", "S"];
  for (let n = 1; n <= MAX_LEVEL; n++) {
    const rating = read(2), tr = read(2);
    if (rating) out.levels[n] = { best: 0, rating, tier: TIER_OF[tr] };
  }
  if (ver >= 2 && pos + 9 <= bytes.length * 8) {
    for (const id of CODE_DECALS) if (read(1)) out.owned.decal.push(id);
    const di = read(3);
    if (di) out.build.decal = DECAL_ORDER[di] || "none";
    out.muddy = !!read(1);
  }
  if (buddyIdx) out.build.buddy = BUDDY_ORDER[buddyIdx - 1];
  if (pos > bytes.length * 8) return null;   /* truncated code: the reads ran past the payload */
  return out;
}
/* full text code: the entire save, gzip-compressed where the browser can */
async function exportFullCode() {
  const json = JSON.stringify({ build: state, ...progress });
  if (typeof CompressionStream !== "undefined") {
    const stream = new Blob([json]).stream().pipeThrough(new CompressionStream("gzip"));
    const buf = await new Response(stream).arrayBuffer();
    return "VROOM2." + b64url.enc(new Uint8Array(buf));
  }
  return "VROOM3." + b64url.enc(new TextEncoder().encode(json));
}
async function decodeSaveCode(code) {
  code = (code || "").trim();
  if (code.startsWith("VROOM1.")) return unpackCompact(code.slice(7));
  if (code.startsWith("VROOM2.")) {
    const stream = new Blob([b64url.dec(code.slice(7))]).stream().pipeThrough(new DecompressionStream("gzip"));
    return JSON.parse(await new Response(stream).text());
  }
  if (code.startsWith("VROOM3.")) return JSON.parse(new TextDecoder().decode(b64url.dec(code.slice(7))));
  return null;
}
let pendingImport = null;
async function importSaveCode(code) {
  let data = null;

}

/* ---- tiny QR encoder: byte mode, ECC level L, versions 1-5 (single EC block) ---- */
function qrEncode(text) {
  const DATA_CW = [0, 19, 34, 55, 80, 108], EC_CW = [0, 7, 10, 15, 20, 26];
  const data = new TextEncoder().encode(text);
  let ver = 0;
  for (let v = 1; v <= 5; v++) if (data.length <= DATA_CW[v] - 2) { ver = v; break; }
  if (!ver) return null;
  /* bitstream -> data codewords */
  const bits = [];
  const pushBits = (val, n) => { for (let i = n - 1; i >= 0; i--) bits.push((val >> i) & 1); };
  pushBits(4, 4); pushBits(data.length, 8);
  for (const b of data) pushBits(b, 8);
  pushBits(0, Math.min(4, DATA_CW[ver] * 8 - bits.length));
  while (bits.length % 8) pushBits(0, 1);
  const cw = [];
  for (let i = 0; i < bits.length; i += 8) cw.push(bits.slice(i, i + 8).reduce((a, b) => (a << 1) | b, 0));
  for (let pad = 0; cw.length < DATA_CW[ver]; pad++) cw.push(pad % 2 ? 0x11 : 0xEC);
  /* Reed-Solomon over GF(256) */
  const gexp = new Array(512), glog = new Array(256);
  for (let i = 0, x = 1; i < 255; i++) { gexp[i] = x; glog[x] = i; x <<= 1; if (x & 256) x ^= 0x11d; }
  for (let i = 255; i < 512; i++) gexp[i] = gexp[i - 255];
  let gen = [1];
  for (let i = 0; i < EC_CW[ver]; i++) {
    const next = new Array(gen.length + 1).fill(0);
    for (let j = 0; j < gen.length; j++) {
      next[j] ^= gexp[(glog[gen[j]] + i) % 255];
      next[j + 1] ^= gen[j];
    }
    gen = next;

  const ec = new Array(EC_CW[ver]).fill(0);
  for (const c of cw) {
    const factor = c ^ ec.shift();
    ec.push(0);
    if (factor) for (let j = 0; j < gen.length - 1; j++) ec[j] ^= gexp[(glog[gen[gen.length - 2 - j]] + glog[factor]) % 255];
  }
  const all = cw.concat(ec);
  /* matrix */
  const size = 17 + 4 * ver;
  const M = Array.from({ length: size }, () => new Array(size).fill(null));   /* null = free for data */
  const setRegion = (r, c, pattern) => pattern.forEach((row, dr) => row.forEach((v, dc) => {
    if (r + dr >= 0 && r + dr < size && c + dc >= 0 && c + dc < size) M[r + dr][c + dc] = v;
  }));
  const finder = [...Array(7)].map((_, r) => [...Array(7)].map((_, c) =>
    (r === 0 || r === 6 || c === 0 || c === 6 || (r >= 2 && r <= 4 && c >= 2 && c <= 4)) ? 1 : 0));
  setRegion(0, 0, finder); setRegion(0, size - 7, finder); setRegion(size - 7, 0, finder);
  /* separators */
  for (let i = 0; i < 8; i++) {
    M[7][i] = 0; M[i][7] = 0;
    M[7][size - 1 - i] = 0; M[i][size - 8] = 0;
    M[size - 8][i] = 0; M[size - 1 - i][7] = 0;
  }
  if (ver >= 2) {   /* single alignment pattern at (4v+10, 4v+10) for v2-5 */
    const ctr = 4 * ver + 10;
    const align = [...Array(5)].map((_, r) => [...Array(5)].map((_, c) =>
      (r === 0 || r === 4 || c === 0 || c === 4 || (r === 2 && c === 2)) ? 1 : 0));
    setRegion(ctr - 2, ctr - 2, align);
  }
  for (let i = 8; i < size - 8; i++) { if (M[6][i] === null) M[6][i] = i % 2 ? 0 : 1; if (M[i][6] === null) M[i][6] = i % 2 ? 0 : 1; }
  M[size - 8][8] = 1;   /* dark module */
  /* reserve format info cells */
  const fmtCells = [];
  for (let i = 0; i <= 5; i++) fmtCells.push([8, i], [i, 8]);
  fmtCells.push([8, 7], [8, 8], [7, 8]);
  for (let i = 0; i < 8; i++) fmtCells.push([8, size - 1 - i], [size - 1 - i, 8]);
  fmtCells.forEach(([r, c]) => { if (M[r][c] === null) M[r][c] = 0; });
  /* zigzag data placement with mask 0: (r+c)%2===0 flips */
  let bitIdx = 0;
  const totalBits = all.length * 8;
  let upward = true;
  for (let col = size - 1; col > 0; col -= 2) {
    if (col === 6) col--;
    for (let i = 0; i < size; i++) {
      const r = upward ? size - 1 - i : i;
      for (const c of [col, col - 1]) {
        if (M[r][c] !== null) continue;
        let bit = bitIdx < totalBits ? (all[bitIdx >> 3] >> (7 - (bitIdx & 7))) & 1 : 0;
        bitIdx++;
        if ((r + c) % 2 === 0) bit ^= 1;
        M[r][c] = bit;
      }
    }
    upward = !upward;
  }
  /* format info: ECC L (01) + mask 0 (000) -> BCH(15,5), XOR 0x5412 */
  let fmt = 0b01000 << 10;
  let rem = fmt;
  for (let i = 14; i >= 10; i--) if ((rem >> i) & 1) rem ^= 0x537 << (i - 10);
  fmt = (fmt | rem) ^ 0x5412;
  const fbit = i => (fmt >> i) & 1;
  for (let i = 0; i <= 5; i++) { M[8][i] = fbit(14 - i); M[i][8] = fbit(i); }
  M[8][7] = fbit(8); M[8][8] = fbit(7); M[7][8] = fbit(6);
  for (let i = 0; i < 8; i++) M[8][size - 1 - i] = fbit(i);
  for (let i = 0; i < 7; i++) M[size - 1 - i][8] = fbit(14 - i);   /* 7 bits — (size-8,8) is the dark module */
  return M;
}
