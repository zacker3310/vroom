function buildLevel(n) {
  laneLayers.forEach(l => l.innerHTML = "");
  props = [];
  RAMPS = [];
  totalStars = 0;
  const rng = mulberry32(n * 7919 + 13);
  LEVEL_LEN = levelLen(n);
  const w = worldOf(n);

  /* ramps: 1-4, spread across the level, spanning all lanes (drawn per lane) */
  const nRamps = 1 + (n > 8 ? 1 : 0) + (n > 20 ? 1 : 0) + (n > 50 ? 1 : 0);
  for (let i = 0; i < nRamps; i++) {
    const rx = Math.floor(LEVEL_LEN * (i + 1) / (nRamps + 1) + (rng() - 0.5) * 400);
    RAMPS.push({ x: rx, w: 250, h: 95 });
    for (let l = 0; l < 3; l++) addProp("ramp", rx, l, LANE_Y[l], rampSVG, 0, -95);
    /* a high bonus star on the jump arc */
    const lane = Math.floor(rng() * 3);
    addProp("star", rx + 460, lane, LANE_Y[lane] - 240, starSVG, -32, -32);
    totalStars++;
  }
  const inRampZone = x => RAMPS.some(rp => x > rp.x - 200 && x < rp.x + rp.w + 420);

  /* slots along the road — density and hard-obstacle share climb with the level (capped) */
  const nObs = 3 + Math.floor(Math.min(n, 40) * 0.75) + Math.floor(Math.max(0, n - 40) * 0.3);
  const nStars = 6 + Math.floor(Math.min(n, 45) / 3);
  const items = [];
  for (let i = 0; i < nObs; i++) {
    const roll = rng();
    let t = "cone";
    if (n >= 3 && roll > Math.max(0.35, 0.6 - n * 0.008)) t = "barrel";
    if (n >= 8 && roll > Math.max(0.6, 0.85 - n * 0.006)) t = "rock";
    if (n >= 12 && roll > Math.max(0.8, 0.95 - n * 0.004)) t = "tnt";
    if (n >= 5 && roll > 0.42 && roll <= 0.52) t = "oil";
    if (n >= 2 && roll < 0.18) t = "puddle";
    /* world flavor: rain doubles down on puddles; later worlds bring their own hazards */
    if (w === 4 && roll < 0.3) t = "puddle";
    if (WORLD_ITEMS[w]) {
      if (roll > 0.3 && roll <= 0.42) t = WORLD_ITEMS[w][0];
      if (roll > 0.18 && roll <= 0.3) t = WORLD_ITEMS[w][1];
    }
    items.push(t);
  }
  for (let i = 0; i < nStars; i++) items.push("star");
  const nCaps = (n >= 2 ? 1 : 0) + (n > 8 ? 1 : 0);   /* surprise capsules */
  for (let i = 0; i < nCaps; i++) items.push("capsule");
  /* shuffle */
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }

  let x = 700;
  const endX = LEVEL_LEN - 600;
  const recentHard = [];   /* keep at least one lane free within any 260px window */
  /* ramp zones are unusable for obstacles, so budget the spacing on usable road only */
  const zoneAhead = from => RAMPS.reduce((s, rp) => {
    const a = Math.max(from, rp.x - 200), b = Math.min(endX, rp.x + rp.w + 420);
    return s + Math.max(0, b - a);
  }, 0);
  for (let i = 0; i < items.length; i++) {
    const t = items[i];
    /* adaptive spacing: divide the remaining usable road across the remaining
       items, capped so the ones still queued can fit before endX */
    const step = Math.max(0, (endX - x - zoneAhead(x)) / (items.length - i));
    x += Math.max(170, Math.min(step * (0.6 + rng() * 0.8), endX - x - (items.length - 1 - i) * 170));
    while (inRampZone(x) && t !== "star") x += 300;
    if (x > endX) continue;
    let lane = Math.floor(rng() * 3);
    const hard = t === "barrel" || t === "rock" || t === "tnt" || (EXTRA_PROPS[t] && EXTRA_PROPS[t].hard);
    if (hard) {
      const near = recentHard.filter(h => Math.abs(h.x - x) < 260);
      if (near.length >= 2) continue;                       /* never block all 3 lanes */
      while (near.some(h => h.lane === lane)) lane = (lane + 1) % 3;
      recentHard.push({ x, lane });
      if (recentHard.length > 6) recentHard.shift();
    }
    const gy = LANE_Y[lane];
    if (t === "cone")    addProp(t, x, lane, gy, coneSVG, -32, -78);
    if (t === "capsule") addProp(t, x, lane, gy, capsuleSVG, -35, -74);
    if (t === "oil")     addProp(t, x, lane, gy, oilSVG, -75, -36);
    if (t === "tnt")    addProp(t, x, lane, gy, tntSVG, -35, -68);
    if (t === "barrel") addProp(t, x, lane, gy, barrelSVG, -33, -82);
    if (t === "rock")   addProp(t, x, lane, gy, rockSVG, -42, -64);
    if (t === "puddle") addProp(t, x, lane, gy, puddleSVG, -115, -22);
    if (t === "star") { addProp(t, x, lane, gy - 85, starSVG, -32, -32); totalStars++; }
    if (EXTRA_PROPS[t]) addWorldProp(t, x, lane);
  }

  addProp("finish", LEVEL_LEN, 0, 690, finishSVG, 0, -360);

  buildScenery(LEVEL_LEN + 1600, w);
  applyTheme(w);
}

/* world plumbing: themes, movers */
function addWorldProp(t, x, lane) {
  const ep = EXTRA_PROPS[t];
  const p = addProp(t, x, lane, LANE_Y[lane], ep.svg, ep.xOff, ep.yOff);
  if (ep.mv) { p.mv = { ...ep.mv }; p.baseX = x; p.xOff = ep.xOff; p.yOff = ep.yOff; }
  return p;
}
function applyTheme(w) {
  const cl = roadScene.classList;
  cl.remove("sunset", "night", "w4", "w5", "w6", "w7", "w8");
  if (w === 2) cl.add("sunset");
  else if (w === 3) cl.add("night");
  else if (w >= 4) cl.add("w" + w);
  buildWeather(w);
}
function buildWeather(w) {
  const el = document.getElementById("weather");
  el.innerHTML = "";
  const spec = (typeof WORLD_WEATHER !== "undefined") && WORLD_WEATHER["w" + w];
  if (!spec) return;
  const rng = mulberry32(w * 131);
  for (let i = 0; i < spec.count; i++) {
    const d = document.createElement("div");
    const conf = spec.make(i, rng);
    d.className = conf.className;
    d.style.cssText += conf.cssText;
    el.appendChild(d);
  }
}
function tickMovers(dt) {
  for (const p of props) {
    if (p.done || !p.mv) continue;
    if (p.mv.vx) {   /* tumbleweed: rolls toward the car */
      p.x += p.mv.vx * dt;
      p.mvSpin = (p.mvSpin || 0) - dt * 260;
      p.el.style.transform = `translateX(${p.x - p.baseX}px) rotate(${p.mvSpin}deg)`;
    }
    if (p.mv.laneHop) {   /* crab: scuttles between lanes */
      p.mvT = (p.mvT || 0) + dt;
      if (p.mvT >= p.mv.laneHop) {
        p.mvT = 0;
        p.mvDir = p.mvDir || 1;
        if (p.lane + p.mvDir > 2 || p.lane + p.mvDir < 0) p.mvDir *= -1;
        p.lane += p.mvDir;
        p.el.style.top = (LANE_Y[p.lane] + p.yOff) + "px";
        laneLayers[p.lane].appendChild(p.el);   /* keep depth order: car z sits between lane layers */
      }
    }
  }
}

      el.style.left = "230px";
      el.style.top = (CAR_BASE_TOP + (targetLane - 1) * 65 - 40) + "px";
      roadScene.appendChild(el);
      gagTimer(() => el.remove(), 1900);
      sfx.squeak(); gagTimer(() => sfx.tada(), 400);
      const muddy = mudEl && mudEl.style.opacity == 1;   /* keep this run's mud through the rebuild */
      carWrap.innerHTML = vehicleSVG(state);
      wheelEls = carWrap.querySelectorAll(".wheelrot");
      mudEl = carWrap.querySelector(".mudSpots");
      if (muddy) mudEl.style.opacity = 1;
      setHeadlights(roadScene.classList.contains("night") || roadScene.classList.contains("w8"));
      return;
    }
    /* all six found: consolation stars */
  }
  const amount = prize.kind === "buddy" ? 5 : prize.amount;
  runStars += amount;
  renderHudStars(true);
  for (let i = 0; i < Math.min(amount, 5); i++) {
    gagTimer(() => { flyStar(p.el, hudStars); sfx.tick(i + 2); }, i * 110);
  }
}

/* ---- sticker badges: award once, toast wordlessly ---- */
let toastTimer = null;
function award(id) {
  if (progress.badges.includes(id)) return;
  progress.badges.push(id);
  save();
  const badge = BADGES.find(x => x.id === id);
  const toast = document.getElementById("stickerToast");
  toast.innerHTML = badge.icon + starIcon;
  toast.classList.remove("show"); void toast.offsetWidth; toast.classList.add("show");
  sfx.chime();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1900);
}

/* prop collision handlers — d = carX - p.x; car front bumper reaches ~+90, tail ~-30 */
const PROP_HIT = {
  capsule(p, d) {
    if (Math.abs(laneVis - p.lane) > 0.65) return;
    if (Math.abs(d) < 75) {
      p.done = true;
      p.el.innerHTML = capsulePopSVG;
      sfx.capsuleOpen();
      openCapsule(p);
    }
  },
  cone(p, d) {
    if (Math.round(laneVis) !== p.lane) return;
    if (d > -30 && d < 90 && v > 30) {
      p.done = true; p.el.classList.add("knocked"); sfx.boink();
      v *= 0.85;                                   /* soft: fun tumble, tiny slow */
    }
  },
  barrel(p, d) { hardHit(p, d, 1); },
  rock(p, d) { hardHit(p, d, 1); },
  tnt(p, d) {
    if (Math.round(laneVis) !== p.lane) return;
    if (d > -20 && d < 95 && v > 25 && jumpY < 45) {
      p.done = true; v = 0; sfx.boom();
      p.el.innerHTML = boomSVG;
      /* boom art (120px) is bigger than the crate (70px): recenter on the crate */
      p.el.style.left = (p.x - 60) + "px";
      p.el.style.top = (p.y - 92) + "px";
      p.el.classList.add("hit");
      applyDamage(2);
      shakeCar();
    }
  },
  oil(p, d) {
    if (Math.round(laneVis) !== p.lane) return;
    if (d > -60 && d < 80 && v > 80 && jumpY < 45) {
      p.done = true; v *= 0.45; sfx.slip();
      carWrap.classList.remove("spin", "wobble"); void carWrap.offsetWidth; carWrap.classList.add("spin");
    }
  },
  puddle(p, d) {
    if (Math.round(laneVis) !== p.lane) return;
    if (d > -80 && d < 80 && v > 30) {
      p.done = true; p.el.classList.add("splashing"); sfx.splash();
      if (mudEl) mudEl.style.opacity = 1;
      if (!progress.muddy) { progress.muddy = true; save(); }
      setTimeout(() => p.el.classList.remove("splashing"), 600);
    }
  },
  star(p, d) {
    /* forgiving magnet for small hands: near-lane counts, and close stars drift in.
       the magnet upgrade widens every window */
    const mag = progress.upgrades.magnet;
    const near = Math.abs(laneVis - p.lane) <= 0.65 + mag * 0.15;
    const carCY = LANE_Y[Math.round(laneVis)] - 85 - jumpY;   /* car body center */
    const dy = carCY - p.y;
    if (near && Math.abs(d) < 75 + mag * 20 && Math.abs(dy) < 125 + mag * 15) {
      p.el.style.transform = "";
      p.done = true; p.el.classList.add("collected");
      /* rising coin-combo pitch: streaks within 1.5s climb the ladder */
      const nw = performance.now();
      starCombo = nw - lastStarT < 1500 ? Math.min(starCombo + 1, 8) : 0;
      lastStarT = nw;
      const f = 880 * Math.pow(1.12, starCombo);
      tone("sine", f, f, 0.15, 0.22); tone("sine", f * 1.5, f * 1.5, 0.25, 0.18, 0.08);
      runStars++; renderHudStars(true);
    } else if (near && d > -(150 + mag * 40) && d < 75 && Math.abs(dy) < 160 + mag * 20) {
      p.el.style.transform = `translate(${d * 0.3}px, ${dy * 0.25}px)`;
    } else if (p.el.style.transform) {
      p.el.style.transform = "";   /* missed it — the star glides back home */
    }
  },
  ramp() {},   /* physics handled by rampElev */
  finish(p, d) {
    if (d > -10) { p.done = true; finished = true; finishLevel(); }
  }
};
function hardHit(p, d, dmg) {
  if (Math.round(laneVis) !== p.lane) return;
  if (d > -20 && d < 95 && v > 25 && jumpY < 45) {   /* jumpY gate: you can jump clean over */
    p.done = true; v = 0; sfx.thud();
    p.el.classList.add("hit");
    applyDamage(dmg);
    shakeCar();
  }
}
function gravityNow() {
  const w = freeMode ? freeThemeIdx + 1 : worldOf(level);
  return w === 8 ? 640 : 1500;
}
/* world-prop collisions: same personalities, new costumes */
function softBonk(p, d) {
  if (Math.round(laneVis) !== p.lane) return;
  if (d > -30 && d < 90 && v > 30) {
    p.done = true;
    if (p.mv) { p.el.style.left = (p.x + (p.xOff || 0)) + "px"; p.el.style.transform = ""; }
    p.el.classList.add("hit"); sfx.boink(); v *= 0.9;
  }
}
PROP_HIT.cactus = (p, d) => hardHit(p, d, 1);
PROP_HIT.crater = (p, d) => hardHit(p, d, 1);
PROP_HIT.ice = PROP_HIT.oil;
PROP_HIT.snowman = softBonk;
PROP_HIT.sandcastle = softBonk;
PROP_HIT.tumbleweed = softBonk;
PROP_HIT.crab = softBonk;
PROP_HIT.alien = (p, d) => {
  if (Math.round(laneVis) !== p.lane) return;
  if (Math.abs(d) < 80 && v > 30) {
    p.done = true; p.el.classList.add("collected");   /* teleports away with a wobble */
    tone("sine", 620, 980, 0.18, 0.22); tone("sine", 980, 500, 0.22, 0.2, 0.18);
  }
};
function shakeCar() {
  freezeUntil = performance.now() + 90;   /* hit-stop: a comedy beat before the wobble */
  /* drop both hit classes: the later .spin rule would shadow .wobble in the cascade */
  carWrap.classList.remove("wobble", "spin"); void carWrap.offsetWidth; carWrap.classList.add("wobble");
  roadScene.classList.remove("quake"); void roadScene.offsetWidth; roadScene.classList.add("quake");
}
function spawnDust() {
  const baseY = CAR_BASE_TOP + (laneVis - 1) * 65 + 200;
  for (let i = 0; i < 3; i++) {
    const dEl = document.createElement("div");
    dEl.className = "dust";
    dEl.style.left = (170 + i * 90 + Math.random() * 30) + "px";
    dEl.style.top = (baseY + Math.random() * 8) + "px";
    dEl.style.animationDelay = (i * 0.05) + "s";
    roadScene.appendChild(dEl);
    gagTimer(() => dEl.remove(), 700);
  }
}

/* ---- damage: cosmetic tiers + mild speed cost, never a fail state ---- */
function vmaxEff() {
  return Math.round((VMAX + progress.upgrades.engine * 80) * (progress.damage >= 5 ? 0.85 : 1));
}
function applyDamage(n) {
  const soaked = Math.max(0, n - progress.upgrades.armor);
  if (!soaked) { sfx.clank(); return; }   /* the shield takes it — ping, no harm */
  progress.damage = Math.min(MAX_DAMAGE, progress.damage + soaked);
  runDamage += soaked;
  save();
  sfx.crunch();
  updateDamageVisuals();
  renderHudDamage(true);
}
function updateDamageVisuals() {
  for (const [cls, min] of [["dmgScuff", 1], ["dmgCrack", 3], ["dmgSmoke", 5]]) {
    carWrap.querySelectorAll("." + cls).forEach(el => el.style.display = progress.damage >= min ? "" : "none");
  }
}
function renderHudDamage(pop) {
  hudDamage.innerHTML = wrenchIcon + `<span>${progress.damage}</span>`;
  hudDamage.classList.toggle("hurt", progress.damage >= 5);
  if (pop) { hudDamage.classList.remove("pop"); void hudDamage.offsetWidth; hudDamage.classList.add("pop"); }
}

function tick(now) {
  /* hit-stop: freeze the world for a beat after a crash */
  if (now < freezeUntil) {
    lastT = now;
    rafId = requestAnimationFrame(tick);
    return;
  }
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  const gas = gasPointers.size > 0 || roadPointers.size > 0 || gasKey;
  const brake = brakePointers.size > 0 || brakeKey;
  if (!finished) {
    if (brake) {
      if (v > 120) sfxSquealThrottle();
      v = Math.max(0, v - BRAKE * dt);
    } else if (gas) v = Math.min(vmaxEff(), v + ACCEL * dt);
    else v = Math.max(0, v - COAST * dt);
    pos += v * dt;
  } else v = 0;
  engineSet(v);

  /* idle nudge: a parked car pulses the gas pedal for first-timers */
  if (v === 0 && !finished && !gas) {
    idleT += dt;
    if (idleT > 4) gasPedal.classList.add("nudge");
  } else {
    idleT = 0;
    gasPedal.classList.remove("nudge");
  }

  if (freeMode) {
    tickFree();
  } else {
    if (!finished) {
      runTime += dt;
      const shown = Math.floor(runTime);
      if (shown !== lastShownTime) { lastShownTime = shown; hudTime.textContent = shown; }
    }
    /* almost there! */
    if (!nearFinish && pos > LEVEL_LEN - 900) { nearFinish = true; sfx.almost(); }
    progDot.style.left = Math.min(100, pos / LEVEL_LEN * 100) + "%";
  }

  const carX = pos + CAR_SCREEN_X;

  /* lane glide */
  laneVis += (targetLane - laneVis) * Math.min(1, dt * 9);
  if (Math.abs(targetLane - laneVis) < 0.01) laneVis = targetLane;
  const laneRound = Math.round(laneVis);
  carWrap.style.zIndex = 11 + laneRound * 2;

  tickMovers(dt);

  /* ramp + jump */
  if (airborne) {
    vy -= gravityNow() * dt;   /* space world: floaty low-gravity jumps */
    jumpY += vy * dt;
    if (jumpY <= 0) {
      jumpY = 0; airborne = false; sfx.clank();
      /* landing: suspension squash + a kick of dust */
      const svg = carWrap.querySelector("svg");
      if (svg) { svg.classList.remove("land"); void carWrap.offsetWidth; svg.classList.add("land"); gagTimer(() => svg.classList.remove("land"), 450); }
      spawnDust();
    }
  } else {
    const wasOn = jumpY > 0;
    const onRamp = rampElev(carX);
    jumpY = onRamp;
    if (wasOn && onRamp === 0) {
      airborne = true; vy = v * 0.9; jumpY = 95;
      sfx.whee();                                   /* every launch gets its whee */
      award("jump");
    }
  }

  /* props */
  for (const p of props) {
    if (p.done) continue;
    PROP_HIT[p.type](p, carX - p.x);
  }

  /* wheels */
  const r = WHEELS[state.wheels].r;
  wheelAngle += (v * dt) / r * (180 / Math.PI);
  wheelEls.forEach(w => w.style.transform = `rotate(${wheelAngle}deg)`);

  /* body dynamics: lean back on the gas, dive on the brake, bank through lane changes */
  const accel = dt > 0 ? (v - prevV) / dt : 0;
  prevV = v;
  const targetBody = Math.max(-8, Math.min(8, accel * 0.006)) + (targetLane - laneVis) * 4;
  bodyTilt += (targetBody - bodyTilt) * Math.min(1, dt * 10);

  /* speed lines when flying along at (near) top speed */
  speedLines.style.opacity = v > 0.9 * vmaxEff() ? 1 : 0;

  /* layers + car */
  let tilt = 0;
  if (airborne) tilt = Math.max(-16, Math.min(20, -vy * 0.035));
  else if (jumpY > 0) tilt = -14;
  tilt -= bodyTilt;   /* negative rotation = nose up (car faces right) */
  tilt = Math.max(-24, Math.min(28, tilt));   /* air + dive + bank can stack to 36: keep it cartoon, not crash-test */
  if (freeMode) {
    /* wrap the finite scenery tiles seamlessly (wrap lengths are tile-period multiples) */
    farLayer.style.transform = `translateX(${-((pos * 0.25) % FAR_WRAP)}px)`;
    midLayer.style.transform = `translateX(${-((pos * 0.55) % MID_WRAP)}px)`;
  } else {
    farLayer.style.transform = `translateX(${-pos * 0.25}px)`;
    midLayer.style.transform = `translateX(${-pos * 0.55}px)`;
  }
  laneLayers.forEach(l => l.style.transform = `translateX(${-pos}px)`);
  const laneOff = (laneVis - 1) * 65;
  carWrap.style.transform = `translateY(${laneOff - jumpY}px) rotate(${tilt}deg) scale(${0.88 + 0.12 * laneVis})`;

  rafId = requestAnimationFrame(tick);
}
let lastSqueal = 0;
function sfxSquealThrottle() {
  const t = performance.now();
  if (t - lastSqueal > 320) { lastSqueal = t; sfx.squeal(); }
}

/* ============ DRIVE INPUT ============ */
const gasPedal = document.getElementById("gasPedal");
const brakePedal = document.getElementById("brakePedal");
function bindPedal(el, set) {
  el.addEventListener("pointerdown", e => {
    e.stopPropagation();
    try { el.setPointerCapture(e.pointerId); } catch (err) {}   /* mouse released off-window still ends the hold */
    set.add(e.pointerId);
    el.classList.add("held");
  });
}
bindPedal(gasPedal, gasPointers);
bindPedal(brakePedal, brakePointers);

roadScene.addEventListener("pointerdown", e => {
  if (e.target.closest(".bigBtn") || e.target.closest(".pedal") || e.target.closest("#celebrate") || e.target.closest(".chip")) return;
  try { roadScene.setPointerCapture(e.pointerId); } catch (err) {}
  roadPointers.set(e.pointerId, e.clientY);
});
roadScene.addEventListener("pointermove", e => {
  if (!roadPointers.has(e.pointerId)) return;
  const scale = stage.getBoundingClientRect().height / 700;
  const dy = (e.clientY - roadPointers.get(e.pointerId)) / scale;
  /* 60 ~= one 65px lane of drag per lane change, so long swipes track the finger */
  if (dy < -60) { setLane(targetLane - 1); roadPointers.set(e.pointerId, e.clientY); }
  else if (dy > 60) { setLane(targetLane + 1); roadPointers.set(e.pointerId, e.clientY); }
});
function pointerEnd(e) {
  roadPointers.delete(e.pointerId);
  if (gasPointers.delete(e.pointerId) && gasPointers.size === 0) gasPedal.classList.remove("held");
  if (brakePointers.delete(e.pointerId) && brakePointers.size === 0) brakePedal.classList.remove("held");
}
addEventListener("pointerup", pointerEnd);
addEventListener("pointercancel", pointerEnd);

document.getElementById("laneUp").addEventListener("pointerdown", e => { e.stopPropagation(); setLane(targetLane - 1); });
document.getElementById("laneDown").addEventListener("pointerdown", e => { e.stopPropagation(); setLane(targetLane + 1); });

/* keyboard: WASD or arrows steer, D/→/space is gas, A/← is brake (mouse can ride the pedals) */
const keyOf = e => (e.key.length === 1 ? e.key.toLowerCase() : e.key);
addEventListener("keydown", e => {
  if (!roadScene.classList.contains("active")) return;
  if (e.repeat) return;
  const k = keyOf(e);
  if (k === "ArrowUp" || k === "w") setLane(targetLane - 1);
  if (k === "ArrowDown" || k === "s") setLane(targetLane + 1);
  if (k === "ArrowRight" || k === "d" || k === " ") gasKey = true;
  if (k === "ArrowLeft" || k === "a") brakeKey = true;
});
addEventListener("keyup", e => {
  const k = keyOf(e);
  if (k === "ArrowRight" || k === "d" || k === " ") gasKey = false;
  if (k === "ArrowLeft" || k === "a") brakeKey = false;
});
/* keyups get lost on window blur, and a hidden tab freezes rAF with the engine gain up */
addEventListener("blur", () => { gasKey = false; brakeKey = false; });
document.addEventListener("visibilitychange", () => {
  if (document.hidden) { gasKey = false; brakeKey = false; engineSet(0); }
});
carWrap.addEventListener("pointerdown", () => {
  sfx.honk(state.body);
  if (state.buddy) setTimeout(() => sfx.squeak(), 160);
});

/* ============ FINISH + CELEBRATION ============ */
function confettiBurst(sceneEl, count) {
  const cols = ["#e63946", "#ffd60a", "#43a047", "#1e88e5", "#ec407a", "#fb8c00"];
  for (let i = 0; i < count; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 1200 + "px";
    c.style.background = cols[i % cols.length];
    c.style.setProperty("--spin", (Math.random() * 900 - 450) + "deg");
    c.style.animationDuration = (1.6 + Math.random() * 1.8) + "s";
    c.style.animationDelay = (Math.random() * 0.8) + "s";
    c.style.borderRadius = Math.random() > 0.5 ? "50%" : "3px";
    sceneEl.appendChild(c);
  }
  setTimeout(() => sceneEl.querySelectorAll(".confetti").forEach(c => c.remove()), 4200);
}

/* a star pops out of the tally and sails into the wallet chip */
function flyStar(fromEl, toEl) {
  const rd = roadScene.getBoundingClientRect();
  const s = rd.width / 1200;
  const a = fromEl.getBoundingClientRect(), b = toEl.getBoundingClientRect();
  const d = document.createElement("div");
  d.className = "flyStar"; d.innerHTML = starIcon;
  d.style.left = ((a.left + a.width / 2 - rd.left) / s - 22) + "px";
  d.style.top = ((a.top + a.height / 2 - rd.top) / s - 22) + "px";
  roadScene.appendChild(d);
  requestAnimationFrame(() => {
    d.style.transform = `translate(${(b.left - a.left + (b.width - a.width) / 2) / s}px, ${(b.top - a.top + (b.height - a.height) / 2) / s}px) scale(.45)`;
    d.style.opacity = ".2";
  });
  setTimeout(() => d.remove(), 700);
}

function finishLevel() {
  sfx.tada();
  confettiBurst(roadScene, 90);
  roadScene.classList.add("celebrating");   /* run HUD steps aside: one star number at a time */

  const clean = runDamage === 0;
  const prev = progress.levels[level];
  /* first time beating a world's last level = big trophy bonus */
  const worldBonus = (level % WORLD_SIZE === 0 && !prev) ? 25 : 0;
  const bonus = 3 + (clean ? 2 : 0) + worldBonus;   /* clean-run bonus: no new dings this run */
  const banked = runStars + bonus;
  const frac = totalStars ? runStars / totalStars : 1;
  const rating = frac >= 0.65 ? 3 : frac >= 0.34 ? 2 : 1;
  if (worldBonus) { confettiBurst(roadScene, 160); setTimeout(() => sfx.tada(), 600); }

  const walletStart = progress.wallet;
  progress.wallet += banked;
  const tier = timeTier(level, runTime);

  /* album keepsakes: a finish-line photo of this exact build, plus first-time stickers */
  progress.photos.unshift({ b: JSON.parse(JSON.stringify(state)), n: level, t: tier, s: runStars });
  progress.photos = progress.photos.slice(0, 6);
  if (clean) award("clean");
  if (tier === "S") award("s");
  if (worldBonus) award("world");
  progress.levels[level] = {
    best: Math.max(prev ? prev.best : 0, runStars),
    rating: Math.max(prev ? prev.rating : 0, rating),
    bestTime: Math.min(prev && prev.bestTime ? prev.bestTime : Infinity, Math.round(runTime * 10) / 10),
    tier: (prev && prev.tier && TIER_RANK[prev.tier] > TIER_RANK[tier]) ? prev.tier : tier
  };
  if (level < MAX_LEVEL) progress.current = Math.max(progress.current, level + 1);
  save();

  /* build the tally UI */
  const tally = document.getElementById("tallyChip");
  tally.innerHTML = starIcon + `<span>0</span>`;
  const cWallet = document.getElementById("celebrateWallet");
  cWallet.innerHTML = starIcon + `<span>${walletStart}</span>`;
  const cTime = document.getElementById("celebrateTime");
  cTime.innerHTML = stopwatchIcon + `<span>${Math.floor(runTime)}</span>` +
    `<span class="medal">${medalSVG(tier)}</span>`;
  const cDamage = document.getElementById("celebrateDamage");
  cDamage.innerHTML = wrenchIcon + `<span>${progress.damage}</span>`;
  cDamage.classList.toggle("clean", clean);
  /* the wrench is garage business — only show it on the victory screen if this run got dinged */
  cDamage.style.display = runDamage > 0 ? "" : "none";
  const ratingRow = document.getElementById("ratingRow");
  ratingRow.innerHTML = [1, 2, 3].map(() =>
    `<svg class="rateStar" viewBox="0 0 64 64"><path d="M32 2 L40 22 L62 24 L45 39 L51 61 L32 48 L13 61 L19 39 L2 24 L24 22 Z" fill="#ffd60a" stroke="#fb8500" stroke-width="3"/></svg>`).join("");
  document.getElementById("nextBtn").style.display = level < MAX_LEVEL ? "" : "none";

  celebrateTimer = setTimeout(() => {
    document.getElementById("celebrate").classList.add("active");
    /* count the stars up one by one, then light the rating */
    let shown = 0;
    const span = tally.querySelector("span");
    const walletSpan = cWallet.querySelector("span");
    tallyTimer = setInterval(() => {
      shown++;
      span.textContent = shown;
      walletSpan.textContent = walletStart + shown;
      flyStar(tally, cWallet);
      cWallet.classList.remove("pop"); void cWallet.offsetWidth; cWallet.classList.add("pop");
      sfx.tick(shown);
      tally.classList.remove("pop"); void tally.offsetWidth; tally.classList.add("pop");
      if (shown >= banked) {
        clearInterval(tallyTimer); tallyTimer = null;
        const rs = ratingRow.querySelectorAll(".rateStar");
        for (let i = 0; i < rating; i++) {
          rateTimers.push(setTimeout(() => { rs[i].classList.add("lit"); sfx.chime(); }, 250 + i * 350));
        }
        /* Nintendo pacing: the payoff plays out first, THEN the buttons slide in */
        rateTimers.push(setTimeout(() => {
          document.getElementById("celebrateRow").classList.add("ready");
        }, 250 + rating * 350 + 450));
      }
    }, banked > 15 ? 60 : 120);   /* long tallies (world bonus) tick twice as fast */
  }, 700);
}
</script>
</body>
</html>
